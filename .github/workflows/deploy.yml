name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:
  repository_dispatch:
    types: [matrix-rain-updated]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Vite site
        run: npm run build
        # Produces dist/ with the main site (index.html, assets/, data/, sonar-ping.mp3)

      - name: Checkout matrix-rain
        uses: actions/checkout@v4
        with:
          repository: KUSH42/matrix-rain
          path: _matrix-rain

      - name: Assemble pages artifact
        run: |
          mkdir -p _site
          # Main site from Vite dist
          cp -r dist/. _site/
          # CRT demo — zero-build, CDN importmap, copy source directly
          mkdir -p _site/crt-demo
          cp -r crt-demo/. _site/crt-demo/
          # Matrix rain WebGPU — zero-build, CDN importmap, copy source directly
          mkdir -p _site/matrix-rain
          cp -r _matrix-rain/. _site/matrix-rain/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
