<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Ring Reveal — Line2</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; }
    canvas { display: block; }
    #badge {
      position: fixed;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      background: #000d0dee;
      border: 1px solid #00ffcc66;
      color: #00ffcc;
      font: 11px/1.6 monospace;
      padding: 6px 14px;
      border-radius: 3px;
      text-align: center;
      pointer-events: none;
      white-space: nowrap;
    }
  </style>
</head>
<body>
<div id="badge">
  LineSegments2 + LineMaterial &nbsp;·&nbsp; true pixel linewidth &nbsp;·&nbsp; arc colour gradient
</div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { EffectComposer, RenderPass, EffectPass, BloomEffect } from 'postprocessing';
import { RingRevealAnimator } from './components/ring-reveal/index.js';
import { easeInOutCubic } from './components/ring-reveal/easings.js';

// ── Scene ──────────────────────────────────────────────────────────────────
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x020808);

const camera = new THREE.PerspectiveCamera(45, innerWidth / innerHeight, 0.1, 100);
camera.position.set(0, 0, 3.5);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.toneMapping = THREE.ReinhardToneMapping;
renderer.toneMappingExposure = 1.07;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.autoRotate = true;
controls.autoRotateSpeed = 0.6;

// ── Bloom ──────────────────────────────────────────────────────────────────
const bloomEffect = new BloomEffect({ intensity: 2.44, radius: 0.72, luminanceThreshold: 0.00, luminanceSmoothing: 0.1 });
const composer = new EffectComposer(renderer, { multisampling: 4 });
composer.addPass(new RenderPass(scene, camera));
composer.addPass(new EffectPass(camera, bloomEffect));

// ── Animator ───────────────────────────────────────────────────────────────
const anim = new RingRevealAnimator(scene, {
  radius:                  1.030,
  numRings:                48,
  samplesPerRing:          256,
  lineColor:               0xff6600,
  lineColorB:              0x00ffff,
  glowColor:               0xff3300,
  glowColorB:              0x00aaff,
  lineWidth:               2,
  opacity:                 0.90,
  glowOpacity:             0.45,
  glowRadius:              1.108,
  glowLayers:              4,
  glowLayerRadiusStep:     0.013,
  glowLayerOpacityFalloff: 0.10,
  emissiveIntensity:       3.00,
  warpAmount:              0.37,
  stagger:                 0.55,
  ringDuration:            0.35,
  durationMs:              1800,
  direction:               'south-to-north',
  colorSpread:             0.52,
  brightSpread:            0.28,
  flickerAmp:              0.15,
  flickerSpeed:            4.0,
  arcColorSpread:          1.00,
  easingFn:                easeInOutCubic,
});
anim.setResolution(innerWidth, innerHeight);
anim.baseRings.renderOrder = 4;
anim.glowRings.renderOrder = 4;

// ── Loop ───────────────────────────────────────────────────────────────────
function loop() { anim.play(() => anim.reverse(loop)); }
loop();

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
  composer.setSize(innerWidth, innerHeight);
  anim.setResolution(innerWidth, innerHeight);
});

const clock = new THREE.Clock();
renderer.setAnimationLoop(() => {
  anim.tick(Math.min(clock.getDelta() * 1000, 100));
  controls.update();
  composer.render();
});
</script>
</body>
</html>
