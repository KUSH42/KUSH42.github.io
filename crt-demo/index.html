<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>LFO Animation Modulator (Ableton style)</title>
  <style>
    body { margin:0; height:100vh; display:grid; place-items:center; background:#111; }
    .box {
      width: 200px; height: 200px;
      background: #0ff;
      box-shadow: 0 0 60px #0ff;
      transition: filter 0.05s; /* optional */
    }
  </style>
</head>
<body>

<div class="box" id="box"></div>

<script>
// ====================== LFO CLASS (copy this) ======================
class LFO {
  constructor(config = {}) {
    this.freq     = config.freq     ?? 1;     // Hz (like LFO Tool rate)
    this.amplitude= config.amplitude?? 1;     // depth/amount
    this.offset   = config.offset   ?? 0;     // center point
    this.phase    = config.phase    ?? 0;     // 0–1
    this.wave     = config.wave     ?? 'sine';
    this._phase   = this.phase * Math.PI * 2;
    this._last    = performance.now();
  }

  get value() {
    const now = performance.now();
    const dt  = (now - this._last) / 1000;
    this._last = now;

    this._phase += dt * this.freq * Math.PI * 2;
    this._phase %= Math.PI * 2;

    let v;
    switch (this.wave) {
      case 'sine':     v = Math.sin(this._phase); break;
      case 'triangle': v = 1 - Math.abs((this._phase / Math.PI) - 1) * 2; break;
      case 'square':   v = this._phase < Math.PI ? 1 : -1; break;
      case 'saw':      v = (this._phase / (Math.PI * 2)) * 2 - 1; break;
      default:         v = Math.sin(this._phase);
    }
    return this.offset + v * this.amplitude;
  }

  // Live tweak like in LFO Tool
  set(config) {
    Object.assign(this, config);
  }
}

// ====================== USAGE EXAMPLE ======================
const box = document.getElementById('box');

// Two LFOs — exactly like Ableton
const lfoScale = new LFO({ freq: 0.8, amplitude: 0.4, offset: 1.0, wave: 'sine' });
const lfoRotate = new LFO({ freq: 1.3, amplitude: 45, offset: 0, wave: 'triangle' });

let lastTime = performance.now();

function animate() {
  const t = (performance.now() - lastTime) / 1000; // not needed but nice for reference

  const scale = lfoScale.value;   // e.g. 0.6 → 1.4
  const rot   = lfoRotate.value;  // e.g. -45 → +45

  box.style.transform = `scale(${scale}) rotate(${rot}deg)`;

  // You can also modulate:
  // box.style.opacity = (lfoOpacity.value + 1) / 2; // 0–1
  // box.style.filter = `hue-rotate(${lfoHue.value}deg)`;

  requestAnimationFrame(animate);
}

animate();

// ====================== LIVE CONTROLS (like LFO Tool) ======================
function createSlider(label, lfo, prop, min, max, step) {
  const div = document.createElement('div');
  div.style.cssText = 'position:fixed;bottom:10px;left:10px;background:rgba(0,0,0,0.8);color:#0ff;padding:10px;border-radius:8px;font-family:monospace';
  div.innerHTML = `
    <label>${label} <input type="range" id="${prop}" min="${min}" max="${max}" step="${step}" value="${lfo[prop]}"></label>
    <span id="${prop}val">${lfo[prop]}</span>
  `;
  document.body.appendChild(div);

  const input = div.querySelector('input');
  const valSpan = div.querySelector(`#${prop}val`);

  input.addEventListener('input', () => {
    lfo.set({ [prop]: parseFloat(input.value) });
    valSpan.textContent = input.value;
  });
}

createSlider('Scale Rate', lfoScale, 'freq', 0.1, 8, 0.1);
createSlider('Scale Depth', lfoScale, 'amplitude', 0, 0.8, 0.01);
createSlider('Rotate Rate', lfoRotate, 'freq', 0.1, 8, 0.1);
createSlider('Rotate Depth', lfoRotate, 'amplitude', 0, 90, 1);

// Waveform selector for scale LFO (add more if you want)
const select = document.createElement('select');
select.style.cssText = 'position:fixed;bottom:10px;right:10px';
['sine','triangle','square','saw'].forEach(w => {
  const opt = document.createElement('option');
  opt.value = w; opt.textContent = w;
  if (w === 'sine') opt.selected = true;
  select.appendChild(opt);
});
select.onchange = () => lfoScale.set({ wave: select.value });
document.body.appendChild(select);
</script>
</body>
</html>
