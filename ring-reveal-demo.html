<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>RingRevealAnimator Demo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; font-family: monospace; }
    canvas { display: block; }

    #ui {
      position: fixed;
      top: 16px;
      left: 16px;
      color: #0ff;
      font-size: 12px;
      display: flex;
      flex-direction: column;
      gap: 5px;
      width: 320px;
      max-height: calc(100vh - 32px);
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: #0ff3 transparent;
      padding-right: 4px;
    }

    .section-label {
      color: #0ff9;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-top: 6px;
      border-bottom: 1px solid #0ff2;
      padding-bottom: 3px;
    }

    #ui label {
      display: flex;
      align-items: center;
      gap: 8px;
      white-space: nowrap;
    }

    #ui label span.lname {
      min-width: 116px;
      color: #0ffc;
    }

    #ui input[type=range] {
      width: 110px;
      accent-color: #0ff;
      cursor: pointer;
    }

    #ui input[type=color] {
      width: 34px;
      height: 20px;
      border: 1px solid #0ff4;
      background: transparent;
      cursor: pointer;
      padding: 1px;
    }

    #ui select {
      background: #001a1a;
      color: #0ff;
      border: 1px solid #0ff4;
      font-family: monospace;
      font-size: 12px;
      padding: 2px 5px;
      cursor: pointer;
      flex: 1;
      min-width: 0;
    }

    .val {
      min-width: 36px;
      text-align: right;
      color: #0ff;
    }

    .btn-row { display: flex; gap: 5px; flex-wrap: wrap; }

    #ui button {
      background: #001a1a;
      color: #0ff;
      border: 1px solid #0ff4;
      padding: 3px 9px;
      cursor: pointer;
      font-family: monospace;
      font-size: 11px;
      white-space: nowrap;
    }
    #ui button:hover  { background: #003333; }
    #ui button.active { background: #004444; border-color: #0ff; }
    #ui button.preset-btn.active { border-color: #0ff; background: #003344; }

    /* preset grid */
    .preset-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 4px;
    }
    .preset-grid button {
      font-size: 10px;
      padding: 4px 2px;
      text-align: center;
    }

    #progress-track {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 10px;
      color: #0ff;
      font-size: 12px;
      font-family: monospace;
    }
    #progress-track input[type=range] {
      width: 260px;
      accent-color: #0ff;
      cursor: pointer;
    }
    #progress-track span { min-width: 38px; }

    #status-bar {
      position: fixed;
      bottom: 52px;
      left: 50%;
      transform: translateX(-50%);
      color: #0ff6;
      font-size: 11px;
      font-family: monospace;
      white-space: nowrap;
      pointer-events: none;
    }
  </style>
</head>
<body>

<div id="ui">

  <!-- Playback -->
  <div class="section-label">Playback</div>
  <div class="btn-row">
    <button id="btnPlay">&#9654; Play</button>
    <button id="btnReverse">&#9664; Rev</button>
    <button id="btnStop">&#10074;&#10074; Stop</button>
    <button id="btnReset">&#8635; Reset</button>
  </div>

  <!-- Loop -->
  <div class="section-label">Loop</div>
  <label>
    <span class="lname">Mode</span>
    <select id="selLoopMode">
      <option value="play-reverse">Play &harr; Reverse</option>
      <option value="play-reset">Play &rarr; Reset</option>
      <option value="preset-cycle">Preset cycle</option>
      <option value="mutate-loop">Mutate loop</option>
    </select>
  </label>
  <div class="btn-row">
    <button id="btnLoop">&#8635; Loop</button>
    <button id="btnLoopOnce">&#8594; Once</button>
  </div>
  <label>
    <span class="lname">Pause between</span>
    <input type="range" id="slPause" min="0" max="3000" step="100" value="0">
    <span class="val" id="vPause">0</span> ms

  <!-- Animation -->

  <label>

    <select id="selDirection">

      <option value="north-to-south">north &rarr; south</option>

  </label>
  <label>

  <label>

  <!-- Ring Variation -->

  </label>
  <label>
    <span class="lname">Bright spread</span>
    <input type="range" id="slBrightSpread" min="0" max="200" value="0">
    <span class="val" id="vBrightSpread">0.00</span>
  </label>
  <label>
    <span class="lname">Flicker amp</span>
    <input type="range" id="slFlickerAmp" min="-100" max="200" value="0">
    <span class="val" id="vFlickerAmp">0.00</span>
  </label>
  <label>
    <span class="lname">Flicker speed</span>
    <input type="range" id="slFlickerSpeed" min="1" max="2000" value="20">
    <span class="val" id="vFlickerSpeed">2.0</span> Hz
  </label>
  <label>
    <span class="lname">Arc color spread</span>
    <input type="range" id="slArcColorSpread" min="-100" max="200" value="0">
    <span class="val" id="vArcColorSpread">0.00</span>
  </label>

  <!-- Appearance -->
  <div class="section-label">Appearance</div>
  <label>
    <span class="lname">Line color A→B</span>
    <input type="color" id="colLine" value="#00ffcc">
    <input type="color" id="colLineB" value="#00ffcc">
  </label>
  <label>
    <span class="lname">Glow color A→B</span>
    <input type="color" id="colGlow" value="#00ffcc">
    <input type="color" id="colGlowB" value="#00ffcc">
  </label>
  <label>
    <span class="lname">Gradient mode</span>
    <select id="selGradientMode">
      <option value="0">RGB</option>
      <option value="1">HSL short</option>
      <option value="2">HSL long</option>
      <option value="3">HSL CW</option>
      <option value="4">HSL CCW</option>
    </select>
  </label>
  <label>
    <span class="lname">Opacity</span>
    <input type="range" id="slOpacity" min="0" max="100" value="70">
    <span class="val" id="vOpacity">0.70</span>
  </label>
  <label>
    <span class="lname">Glow opacity</span>
    <input type="range" id="slGlowOpacity" min="0" max="100" value="25">
    <span class="val" id="vGlowOpacity">0.25</span>
  </label>
  <label>
    <span class="lname">Emissive</span>
    <input type="range" id="slEmissive" min="10" max="2000" value="150">
    <span class="val" id="vEmissive">1.50</span>
  </label>
  <label>
    <span class="lname">Glow radius</span>
    <input type="range" id="slGlowRad" min="100" max="200" value="108">
    <span class="val" id="vGlowRad">1.008</span>
  </label>
  <label>
    <span class="lname">Glow layers</span>
    <input type="range" id="slGlowLayers" min="1" max="12" step="1" value="3">

  </label>
  <label>
    <span class="lname">Layer falloff</span>
    <input type="range" id="slGlowFalloff" min="10" max="100" value="50">
    <span class="val" id="vGlowFalloff">0.50</span>
  </label>
  <label>

  </label>

  <!-- Presets -->
  <div class="section-label">Presets</div>
  <div class="preset-grid" id="presetGrid"></div>
  <label>
    <span class="lname">Morph duration</span>

  <!-- Randomize -->
  <div class="section-label">Randomize / Mutate</div>
  <div class="btn-row">
    <button id="btnRandAll">* All</button>

  <label>

  <!-- Rings -->
  <div class="section-label">Rings</div>
  <label>
    <span class="lname">Mode</span>

<div id="progress-track">
  <span>Progress</span>
  <input type="range" id="slProgress" min="0" max="1000" value="0">
  <span id="vProgress">0.000</span>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { EffectComposer, RenderPass, EffectPass, BloomEffect, ToneMappingEffect, ToneMappingMode } from 'postprocessing';
import { LineSegmentsGeometry } from 'three/addons/lines/LineSegmentsGeometry.js';
import { LineSegments2 } from 'three/addons/lines/LineSegments2.js';
import { LineMaterial } from 'three/addons/lines/LineMaterial.js';
import { RingRevealAnimator } from './components/ring-reveal/index.js';
import { easeInOutCubic, easeOutExpo, backInOut, linear } from './components/ring-reveal/easings.js';

// ── Scene ──────────────────────────────────────────────────────────────────
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x020808);

const camera = new THREE.PerspectiveCamera(45, innerWidth / innerHeight, 0.1, 100);
camera.position.set(0, 0, 3.5);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.toneMapping = THREE.ReinhardToneMapping;
renderer.toneMappingExposure = 1.83;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.autoRotate = true;
controls.autoRotateSpeed = 0.6;

// ── Post-processing ────────────────────────────────────────────────────────
// postprocessing library: higher-quality bloom with built-in MSAA multisampling.
const bloomEffect = new BloomEffect({ intensity: 1.33, radius: 0.67, luminanceThreshold: 0.13, luminanceSmoothing: 0.1 });
const toneMappingEffect = new ToneMappingEffect({ mode: ToneMappingMode.REINHARD });
const composer = new EffectComposer(renderer, { multisampling: 4 });
composer.addPass(new RenderPass(scene, camera));
composer.addPass(new EffectPass(camera, bloomEffect, toneMappingEffect));

// ── Reference globe ────────────────────────────────────────────────────────
const WR = 1.002; // slightly > 1.0 to avoid z-fighting with rings

// Shared depth layers (used by both sphere modes)
// Layer A — BackSide occluder at 0.98r so back-face lines fail depth test.
const backOccluder = new THREE.Mesh(
  new THREE.SphereGeometry(0.98, 48, 48),
  new THREE.MeshBasicMaterial({ colorWrite: false, depthWrite: true, depthTest: true, depthFunc: THREE.AlwaysDepth, side: THREE.BackSide }),
);
backOccluder.renderOrder = 0;
scene.add(backOccluder);

// Layer B — dark fill so back-hemisphere lines are hidden.
const globeSurface = new THREE.Mesh(
  new THREE.SphereGeometry(1.0, 48, 48),
  new THREE.MeshBasicMaterial({ color: 0x001510, transparent: true, opacity: 0.88, depthWrite: true, side: THREE.DoubleSide }),
);
globeSurface.renderOrder = 0;
scene.add(globeSurface);

// ── Lat/lon grid (LineBasicMaterial — no caps, no cross-artifacts) ──────────
// NOTE: renderOrder must be set on individual Line objects, not on the Group —
// Group.renderOrder is ignored by the renderer when collecting renderables.
const latlonMat = new THREE.LineBasicMaterial({ color: 0x00ffcc, transparent: true, opacity: 0.55, blending: THREE.AdditiveBlending, depthTest: true, depthWrite: false });
const globeLatLon = new THREE.Group();
const LAT = 10, LON = 20, SEGS = 64;
// Latitude rings (horizontal circles)
for (let i = 1; i < LAT; i++) {
  const phi = (i / LAT) * Math.PI;
  const y  = WR * Math.cos(phi);
  const sr = WR * Math.sin(phi);
  const pts = [];
  for (let j = 0; j <= SEGS; j++) {
    const t = (j / SEGS) * Math.PI * 2;
    pts.push(new THREE.Vector3(sr * Math.cos(t), y, sr * Math.sin(t)));
  }
  const ring = new THREE.LineLoop(new THREE.BufferGeometry().setFromPoints(pts), latlonMat);
  ring.renderOrder = 1;
  globeLatLon.add(ring);
}
// Longitude meridians (vertical half-circles)
for (let j = 0; j < LON; j++) {
  const t = (j / LON) * Math.PI * 2;
  const pts = [];
  for (let i = 0; i <= SEGS; i++) {
    const phi = (i / SEGS) * Math.PI;
    pts.push(new THREE.Vector3(
      WR * Math.sin(phi) * Math.cos(t),
      WR * Math.cos(phi),
      WR * Math.sin(phi) * Math.sin(t),
    ));
  }
  const meridian = new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts), latlonMat);
  meridian.renderOrder = 1;
  globeLatLon.add(meridian);
}
scene.add(globeLatLon);

// ── Geodesic wireframe (Line2) — arcs projected to sphere surface ────────────
// WireframeGeometry chords dip inside the sphere at their midpoints and get clipped.
// Instead, extract unique edges and subdivide each into short arcs along the surface.
function buildGeodesicArcPositions(radius, detail, edgeSegs) {
  const geo = new THREE.IcosahedronGeometry(1, detail);
  const pos = geo.attributes.position;
  // IcosahedronGeometry with detail>0 is non-indexed — every 3 vertices = one triangle.
  const triCount = pos.count / 3;
  const va = new THREE.Vector3(), vb = new THREE.Vector3();
  const edgeSet = new Map();
  for (let t = 0; t < triCount; t++) {
    const base = t * 3;
    for (let e = 0; e < 3; e++) {
      const ai = base + e, bi = base + (e + 1) % 3;
      va.fromBufferAttribute(pos, ai);
      vb.fromBufferAttribute(pos, bi);
      // Key by rounded coords so shared edges (same world position, different indices) are deduplicated
      const key = [va, vb].map(v => `${v.x.toFixed(5)},${v.y.toFixed(5)},${v.z.toFixed(5)}`).sort().join('|');
      if (!edgeSet.has(key)) edgeSet.set(key, [va.clone(), vb.clone()]);
    }
  }
  const out = [];
  for (const [pa, pb] of edgeSet.values()) {
    for (let s = 0; s < edgeSegs; s++) {
      const p0 = new THREE.Vector3().lerpVectors(pa, pb, s / edgeSegs).normalize().multiplyScalar(radius);
      const p1 = new THREE.Vector3().lerpVectors(pa, pb, (s + 1) / edgeSegs).normalize().multiplyScalar(radius);
      out.push(p0.x, p0.y, p0.z, p1.x, p1.y, p1.z);
    }
  }
  return new Float32Array(out);
}
const icoEdgeGeo = new LineSegmentsGeometry();
icoEdgeGeo.setPositions(buildGeodesicArcPositions(WR, 3, 4));
const icoMat = new LineMaterial({ color: 0x00ffcc, transparent: true, opacity: 0.35, blending: THREE.AdditiveBlending, depthTest: true, depthWrite: false, linewidth: 1.0, resolution: new THREE.Vector2(innerWidth, innerHeight) });
const globeWireframe = new LineSegments2(icoEdgeGeo, icoMat);
globeWireframe.renderOrder = 1;
globeWireframe.visible = false;
scene.add(globeWireframe);

scene.add(new THREE.AmbientLight(0xffffff, 0.3));
const dirLight = new THREE.DirectionalLight(0x00ffcc, 1.2);
dirLight.position.set(2, 3, 2);
scene.add(dirLight);

// ── Easing map ─────────────────────────────────────────────────────────────
const EASINGS = { easeInOutCubic, easeOutExpo, backInOut, linear };

// ── Preset definitions ─────────────────────────────────────────────────────
const PRESETS = {
  // Clean teal south-to-north sweep — baseline reference
  default:  { label: 'Default',  lineColor: 0x00ffcc, glowColor: 0x00ffcc, opacity: 0.72, glowOpacity: 0.28, emissiveIntensity: 1.8, stagger: 0.55, ringFade: 0.35, warpAmount: 0.12, numRings: 48, direction: 'south-to-north', easingKey: 'easeInOutCubic', durationMs: 2200 },
  // Thin hot-pink pulse ring racing from equator outward
  pulse:    { label: 'Pulse',    lineColor: 0xff0066, lineColorB: 0xff6600, glowColor: 0xff0044, glowColorB: 0xff4400, opacity: 0.95, glowOpacity: 0.55, emissiveIntensity: 6.0, stagger: 1.00, ringFade: 0.10, warpAmount: 0.20, numRings: 48, direction: 'equator-out', easingKey: 'easeOutExpo', durationMs: 1400, brightSpread: 0.15, flickerAmp: 0.25, flickerSpeed: 8.0, glowLayers: 5, glowLayerRadiusStep: 0.005, glowLayerOpacityFalloff: 0.40 },
  // Tight scan line sweeping south-to-north, green, near-instant
  scanner:  { label: 'Scanner',  lineColor: 0x00ff66, glowColor: 0x00bb44, opacity: 0.90, glowOpacity: 0.35, emissiveIntensity: 3.0, stagger: 0.96, ringFade: 0.07, warpAmount: 0.03, numRings: 32, direction: 'south-to-north', easingKey: 'linear', durationMs: 2200, colorSpread: 0.06 },
  // Purple-to-teal gradient equatorial burst
  cosmic:   { label: 'Cosmic',   lineColor: 0x9944ff, lineColorB: 0x00eeff, glowColor: 0x5522cc, glowColorB: 0x0099bb, opacity: 0.75, glowOpacity: 0.38, emissiveIntensity: 2.8, stagger: 0.48, ringFade: 0.38, warpAmount: 0.24, numRings: 64, direction: 'equator-out', easingKey: 'easeInOutCubic', durationMs: 3200, colorSpread: 0.32, brightSpread: 0.18, flickerAmp: 0.06, flickerSpeed: 1.5, glowLayers: 3 },
  // Fire blast — yellow-to-red gradient, warp snap, south-to-north
  ignition: { label: 'Ignition', lineColor: 0xffee00, lineColorB: 0xff2200, glowColor: 0xff9900, glowColorB: 0xff1100, opacity: 0.95, glowOpacity: 0.55, emissiveIntensity: 5.5, stagger: 0.88, ringFade: 0.20, warpAmount: 0.50, numRings: 40, direction: 'south-to-north', easingKey: 'backInOut', durationMs: 1600, colorSpread: 0.18, brightSpread: 0.42, flickerAmp: 0.28, flickerSpeed: 7.0, glowLayers: 4, glowLayerRadiusStep: 0.006, glowLayerOpacityFalloff: 0.38 },
  // Translucent blue dissolve, few sparse rings, slow north-to-south

// ── Build animator ─────────────────────────────────────────────────────────
let anim = null;

function getOptions() {
  return {
    radius:            +document.getElementById('slRadius').value / 100,
    numRings:          +document.getElementById('slNumRings').value,
    samplesPerRing:    +document.getElementById('slSamples').value,
    durationMs:        +document.getElementById('slDuration').value,
    direction:         document.getElementById('selDirection').value,

    jitter:            +document.getElementById('slJitter').value,
    ringFade:      +document.getElementById('slRingFade').value / 100,
    invert:        document.getElementById('chkInvert').checked,
    easingFn:          EASINGS[document.getElementById('selEasing').value],
    lineColor:         parseInt(document.getElementById('colLine').value.slice(1), 16),
    lineColorB:        parseInt(document.getElementById('colLineB').value.slice(1), 16),
    glowColor:         parseInt(document.getElementById('colGlow').value.slice(1), 16),
    glowColorB:        parseInt(document.getElementById('colGlowB').value.slice(1), 16),
    gradientMode:      +document.getElementById('selGradientMode').value,
    opacity:           +document.getElementById('slOpacity').value / 100,
    glowOpacity:       +document.getElementById('slGlowOpacity').value / 100,
    emissiveIntensity: +document.getElementById('slEmissive').value / 100,
    warpAmount:        +document.getElementById('slWarp').value / 100,
    glowRadius:              +document.getElementById('slGlowRad').value / 100,
    glowLayers:              +document.getElementById('slGlowLayers').value,
    glowLayerRadiusStep:     +document.getElementById('slGlowStep').value / 1000,
    glowLayerOpacityFalloff: +document.getElementById('slGlowFalloff').value / 100,
    colorSpread:       +document.getElementById('slColorSpread').value / 100,
    brightSpread:      +document.getElementById('slBrightSpread').value / 100,
    flickerAmp:        +document.getElementById('slFlickerAmp').value / 100,
    flickerSpeed:      +document.getElementById('slFlickerSpeed').value / 10,
    arcColorSpread:    +document.getElementById('slArcColorSpread').value / 100,
    morphDurationMs:   +document.getElementById('slMorphDur').value,
    mode:              document.getElementById('selMode').value,
    scrollSpeed:       +document.getElementById('slScrollSpeed').value / 100,
  };
}

function buildAnim() {
  if (anim) { anim.dispose(); anim = null; }
  anim = new RingRevealAnimator(scene, getOptions());
  window.__anim = anim;
  anim.setResolution(innerWidth, innerHeight);
  anim.baseRings.renderOrder = 4;
  anim.glowRings.renderOrder = 4;
}

buildAnim();

// ── Sync all UI sliders/inputs from a flat config object ───────────────────
function syncUI(cfg) {
  if (cfg.lineColor  !== undefined) {
    document.getElementById('colLine').value  = '#' + cfg.lineColor.toString(16).padStart(6, '0');
  }
  if (cfg.lineColorB !== undefined) {
    document.getElementById('colLineB').value = '#' + cfg.lineColorB.toString(16).padStart(6, '0');
  }
  if (cfg.glowColor  !== undefined) {
    document.getElementById('colGlow').value  = '#' + cfg.glowColor.toString(16).padStart(6, '0');
  }
  if (cfg.glowColorB !== undefined) {
    document.getElementById('colGlowB').value = '#' + cfg.glowColorB.toString(16).padStart(6, '0');
  }
  const set = (id, v, display, toDisp) => {
    if (v === undefined) return;
    document.getElementById(id).value = v;
    if (display) document.getElementById(display).textContent = toDisp ? toDisp(v) : v;
  };
  set('slOpacity',     cfg.opacity    !== undefined ? Math.round(cfg.opacity    * 100) : undefined, 'vOpacity',     v => (v / 100).toFixed(2));
  set('slGlowOpacity', cfg.glowOpacity !== undefined ? Math.round(cfg.glowOpacity * 100) : undefined, 'vGlowOpacity', v => (v / 100).toFixed(2));
  set('slEmissive',    cfg.emissiveIntensity !== undefined ? Math.round(cfg.emissiveIntensity * 100) : undefined, 'vEmissive', v => (v / 100).toFixed(2));
  set('slStagger',     cfg.stagger    !== undefined ? Math.round(cfg.stagger    * 100) : undefined, 'vStagger',     v => (v / 100).toFixed(2));
  set('slJitter',      cfg.jitter     !== undefined ? Math.round(cfg.jitter)           : undefined, 'vJitter',      v => Math.round(v));
  if (cfg.jitter !== undefined && anim) anim.setJitter(cfg.jitter);
  set('slWarp',        cfg.warpAmount !== undefined ? Math.round(cfg.warpAmount * 100) : undefined, 'vWarp',        v => (v / 100).toFixed(2));
  set('slNumRings',    cfg.numRings,                                                                 'vNumRings');
  set('slColorSpread',  cfg.colorSpread  !== undefined ? Math.round(cfg.colorSpread  * 100) : undefined, 'vColorSpread',  v => (v / 100).toFixed(2));
  set('slBrightSpread', cfg.brightSpread !== undefined ? Math.round(cfg.brightSpread * 100) : undefined, 'vBrightSpread', v => (v / 100).toFixed(2));
  set('slFlickerAmp',   cfg.flickerAmp   !== undefined ? Math.round(cfg.flickerAmp   * 100) : undefined, 'vFlickerAmp',   v => (v / 100).toFixed(2));
  set('slFlickerSpeed',    cfg.flickerSpeed    !== undefined ? Math.round(cfg.flickerSpeed    * 10)  : undefined, 'vFlickerSpeed',    v => (v / 10).toFixed(1));
  set('slArcColorSpread', cfg.arcColorSpread  !== undefined ? Math.round(cfg.arcColorSpread  * 100) : undefined, 'vArcColorSpread',  v => (v / 100).toFixed(2));
  if (cfg.gradientMode !== undefined) {
    document.getElementById('selGradientMode').value = cfg.gradientMode;
    if (anim) anim.setGradientMode(cfg.gradientMode);
  }
  set('slGlowLayers',   cfg.glowLayers,                                                                   'vGlowLayers');
  set('slGlowStep',     cfg.glowLayerRadiusStep     !== undefined ? Math.round(cfg.glowLayerRadiusStep     * 1000) : undefined, 'vGlowStep',    v => (v / 1000).toFixed(3));
  set('slGlowFalloff',  cfg.glowLayerOpacityFalloff !== undefined ? Math.round(cfg.glowLayerOpacityFalloff * 100)  : undefined, 'vGlowFalloff', v => (v / 100).toFixed(2));
  if (cfg.ringFade !== undefined) {
    const v = Math.max(0.001, cfg.ringFade);
    set('slRingFade', Math.round(v * 100), 'vRingFade', x => (x / 100).toFixed(2));
    // Uniforms not written here — morphTo owns uRingFade and applies it via
    // _applyMorphT. Writing here causes a jump-back glitch on the first morph tick.
  }
  if (cfg.invert !== undefined) {
    document.getElementById('chkInvert').checked = !!cfg.invert;
    if (anim) anim.setInvert(!!cfg.invert);
  }
  set('slDuration',    cfg.durationMs,                                                               'vDuration');
  if (cfg.direction) {
    document.getElementById('selDirection').value = cfg.direction;
    const dirMap = { 'south-to-north': 0, 'north-to-south': 1, 'equator-out': 2 };
    const d = dirMap[cfg.direction] ?? 0;
    if (anim) {
      anim._baseRings.material.uniforms.uDirection.value = d;
      anim._glowLayers.forEach(l => { l.material.uniforms.uDirection.value = d; });
    }
  }
  if (cfg.easingKey) {
    document.getElementById('selEasing').value = cfg.easingKey;
    if (anim) anim._options.easingFn = EASINGS[cfg.easingKey];
  }
  if (cfg.mode !== undefined) {
    document.getElementById('selMode').value = cfg.mode;
  }
  if (cfg.scrollSpeed !== undefined) {
    const sv = Math.round(cfg.scrollSpeed * 100);
    document.getElementById('slScrollSpeed').value = sv;
    document.getElementById('vScrollSpeed').textContent = cfg.scrollSpeed.toFixed(2);
  }
}

// ── Apply a named preset ───────────────────────────────────────────────────
function applyPreset(key, withMorph = true) {
  const p = PRESETS[key];
  if (!p) return;

  // Update active button highlight
  document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(`preset-${key}`)?.classList.add('active');
  activePresetKey = key;

  // Immediate non-morphable params
  syncUI({ direction: p.direction, easingKey: p.easingKey, durationMs: p.durationMs });
  anim._options.durationMs = p.durationMs;

  const dur = withMorph ? +document.getElementById('slMorphDur').value : 0;

  anim.morphTo({
    lineColor:               p.lineColor,
    lineColorB:              p.lineColorB  ?? p.lineColor,
    glowColor:               p.glowColor,
    glowColorB:              p.glowColorB  ?? p.glowColor,
    opacity:                 p.opacity,
    glowOpacity:             p.glowOpacity,
    emissiveIntensity:       p.emissiveIntensity,
    stagger:                 p.stagger,
    warpAmount:              p.warpAmount,
    numRings:                p.numRings,
    ringFade:            p.ringFade,
    colorSpread:             p.colorSpread             ?? 0,
    brightSpread:            p.brightSpread            ?? 0,
    flickerAmp:              p.flickerAmp              ?? 0,
    flickerSpeed:            p.flickerSpeed            ?? 2.0,
    glowLayers:              p.glowLayers              ?? 3,
    glowLayerRadiusStep:     p.glowLayerRadiusStep     ?? 0.004,
    glowLayerOpacityFalloff: p.glowLayerOpacityFalloff ?? 0.5,
  }, dur);

  syncUI(p);
  setStatus(`Preset: ${p.label}`);
}

// ── Progress scrubber ──────────────────────────────────────────────────────
let scrubbing = false;
const slProgress = document.getElementById('slProgress');
const vProgress  = document.getElementById('vProgress');

slProgress.addEventListener('mousedown', () => { scrubbing = true; anim.stop(); });
slProgress.addEventListener('touchstart', () => { scrubbing = true; anim.stop(); }, { passive: true });
slProgress.addEventListener('mouseup',   () => { scrubbing = false; });
slProgress.addEventListener('touchend',  () => { scrubbing = false; });
slProgress.addEventListener('input', () => {
  const p = slProgress.value / 1000;
  anim._progress = p;
  anim._elapsed  = p * anim._options.durationMs;
  anim._setProgress(p);
  vProgress.textContent = p.toFixed(3);
});

// ── Loop state ─────────────────────────────────────────────────────────────
let looping = false;
let loopTimer = null;

function clearLoopTimer() {
  if (loopTimer !== null) { clearTimeout(loopTimer); loopTimer = null; }
}

function pauseThen(ms, fn) {
  clearLoopTimer();
  if (ms <= 0) fn();
  else loopTimer = setTimeout(fn, ms);
}

function getLoopPause() { return +document.getElementById('slPause').value; }

// Each loop mode returns a function that starts one "cycle" and calls done() when it ends.
function runLoopCycle(done) {
  const mode = document.getElementById('selLoopMode').value;
  const pause = getLoopPause();

  if (mode === 'play-reverse') {
    anim.reset();
    anim.play(() => pauseThen(pause, () => {
      if (!looping) return;
      anim.reverse(() => pauseThen(pause, done));
    }));

  } else if (mode === 'play-reset') {
    anim.reset();
    anim.play(() => pauseThen(pause, done));

  } else if (mode === 'preset-cycle') {
    const idx = PRESET_KEYS.indexOf(activePresetKey);
    const nextKey = PRESET_KEYS[(idx + 1) % PRESET_KEYS.length];
    applyPreset(nextKey, true);
    const morphDur = +document.getElementById('slMorphDur').value;
    pauseThen(morphDur + 50, () => {
      if (!looping) return;
      anim.reset();
      anim.play(() => {
        if (!looping) return;
        pauseThen(pause, () => {
          if (!looping) return;
          anim.reverse(() => pauseThen(pause, done));
        });
      });
    });

  } else if (mode === 'mutate-loop') {
    anim.reset();
    anim.play(() => pauseThen(pause, () => {
      if (!looping) return;
      anim.reverse(() => {
        if (!looping) return;
        pauseThen(pause, () => {
          mutateAll(+document.getElementById('slMutateStr').value);
          pauseThen(450, done); // allow 400ms mutation morph to complete before reset()
        });
      });
    }));
  }
}

function startLoop() {
  if (!looping) return;
  runLoopCycle(() => { if (looping) startLoop(); });
}

function stopLoop() {
  looping = false;
  clearLoopTimer();
  anim.stop();
  document.getElementById('btnLoop').classList.remove('active');
}

document.getElementById('btnLoop').addEventListener('click', () => {
  looping = !looping;
  document.getElementById('btnLoop').classList.toggle('active', looping);
  if (looping) startLoop();
  else stopLoop();
});

// Run a single cycle then stop
document.getElementById('btnLoopOnce').addEventListener('click', () => {
  stopLoop();
  looping = true; // needed so runLoopCycle internal checks pass
  runLoopCycle(() => { looping = false; setStatus('Done'); });
});

// ── Basic playback buttons ─────────────────────────────────────────────────
document.getElementById('btnPlay').addEventListener('click', () => {
  stopLoop();
  anim.play();
});
document.getElementById('btnReverse').addEventListener('click', () => {
  stopLoop();
  anim.reverse();
});
document.getElementById('btnStop').addEventListener('click', () => {
  stopLoop();
  anim.stop();
});
document.getElementById('btnReset').addEventListener('click', () => {
  stopLoop();
  anim.reset();
  syncProgress(0);
});

// ── Animation params (live, no rebuild) ───────────────────────────────────
document.getElementById('selDirection').addEventListener('change', e => {
  const dirMap = { 'south-to-north': 0, 'north-to-south': 1, 'equator-out': 2 };
  const d = dirMap[e.target.value] ?? 0;
  anim._options.direction = e.target.value;
  anim._baseRings.material.uniforms.uDirection.value = d;
  anim._glowLayers.forEach(l => { l.material.uniforms.uDirection.value = d; });
});

document.getElementById('selEasing').addEventListener('change', e => {
  anim._options.easingFn = EASINGS[e.target.value];
});

document.getElementById('slDuration').addEventListener('input', e => {
  anim._options.durationMs = +e.target.value;
  document.getElementById('vDuration').textContent = e.target.value;
});

document.getElementById('slStagger').addEventListener('input', e => {
  const v = e.target.value / 100;
  document.getElementById('vStagger').textContent = v.toFixed(2);
  anim._baseRings.material.uniforms.uStagger.value = v;
  anim._glowLayers.forEach(l => { l.material.uniforms.uStagger.value = v; });
  anim._options.stagger = v;
});

document.getElementById('slJitter').addEventListener('input', e => {
  const v = +e.target.value;
  document.getElementById('vJitter').textContent = v;
  anim.setJitter(v);
});

document.getElementById('slRingFade').addEventListener('input', e => {
  const v = Math.max(0.001, e.target.value / 100);
  document.getElementById('vRingFade').textContent = v.toFixed(2);
  anim._baseRings.material.uniforms.uRingFade.value = v;
  anim._glowLayers.forEach(l => { l.material.uniforms.uRingFade.value = v; });
  anim._options.ringFade = v;
});

document.getElementById('chkInvert').addEventListener('change', e => {
  anim.setInvert(e.target.checked);
});

// ── Geometry params (rebuild on commit) ───────────────────────────────────
function rebuildGeom() {
  const progress = anim._progress;
  const playing  = anim._playing;
  buildAnim();
  anim._progress = progress;
  anim._elapsed  = progress * anim._options.durationMs;
  anim._setProgress(progress);
  if (playing) anim.play();
}

for (const [id, valId, fmt] of [
  ['slNumRings', 'vNumRings', v => v],
  ['slSamples',  'vSamples',  v => v],
  ['slRadius',   'vRadius',   v => (v / 100).toFixed(3)],
]) {
  document.getElementById(id).addEventListener('input',  e => { document.getElementById(valId).textContent = fmt(e.target.value); });
  document.getElementById(id).addEventListener('change', e => { document.getElementById(valId).textContent = fmt(e.target.value); rebuildGeom(); });
}

document.getElementById('slGlowRad').addEventListener('input', e => {

// ── Randomize helpers ──────────────────────────────────────────────────────
function rand(min, max) { return min + Math.random() * (max - min); }
function randInt(min, max) { return Math.round(rand(min, max)); }
function randChoice(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

// Vivid random color: random hue, high saturation, mid-high lightness
function randomNeonColor() {
  const h = Math.random();
  const s = rand(0.7, 1.0);
  const l = rand(0.45, 0.65);
  const c = new THREE.Color().setHSL(h, s, l);
  return Math.round(c.r * 255) << 16 | Math.round(c.g * 255) << 8 | Math.round(c.b * 255);
}

// Slightly shift a color by ±hue/sat/light delta
function mutateColor(hex, strength) {
  const c = new THREE.Color(hex);
  const hsl = {};
  c.getHSL(hsl);
  const h = (hsl.h + rand(-strength, strength) * 0.15 + 1) % 1;
  const s = Math.max(0.2, Math.min(1, hsl.s + rand(-strength, strength) * 0.3));
  const l = Math.max(0.2, Math.min(0.85, hsl.l + rand(-strength, strength) * 0.2));
  const out = new THREE.Color().setHSL(h, s, l);
  return (Math.round(out.r * 255) << 16) | (Math.round(out.g * 255) << 8) | Math.round(out.b * 255);
}

function clampN(v, min, max) { return Math.max(min, Math.min(max, v)); }

// nudge a value by ±strength% of its range
function nudge(val, min, max, strength) {
  const range = max - min;
  return clampN(val + rand(-1, 1) * strength * range, min, max);
}

// Apply a config diff immediately (no morph, used for randomize)
function applyImmediate(cfg) {
  stopLoop();
  anim.morphTo(cfg, 0); // numRings change handled by cross-fade inside morphTo
  syncUI(cfg);
  if (cfg.numRings)       { document.getElementById('slNumRings').value = cfg.numRings; document.getElementById('vNumRings').textContent = cfg.numRings; }
  if (cfg.samplesPerRing) { document.getElementById('slSamples').value = cfg.samplesPerRing; document.getElementById('vSamples').textContent = cfg.samplesPerRing; }
}

// ── Randomize All ──────────────────────────────────────────────────────────
function randomizeAll() {
  const lc  = randomNeonColor();
  const lcB = randomNeonColor();
  const gc  = mutateColor(lc, 0.3);
  const gcB = mutateColor(lcB, 0.3);
  applyImmediate({
    lineColor:         lc,
    lineColorB:        lcB,
    glowColor:         gc,
    glowColorB:        gcB,
    opacity:           rand(0.3, 0.95),
    glowOpacity:       rand(0.05, 0.55),
    emissiveIntensity: rand(0.5, 5.0),
    stagger:           rand(0, 1),
    jitter:            rand(0, 60),
    warpAmount:        rand(0, 0.5),
    numRings:          randInt(6, 100),
    ringFade:      rand(0.08, 0.70),
    direction:         randChoice(['south-to-north', 'north-to-south', 'equator-out']),
    easingKey:         randChoice(Object.keys(EASINGS)),
    durationMs:        randInt(600, 5000),
    colorSpread:       rand(0, 0.5),
    brightSpread:      rand(0, 0.5),
    flickerAmp:        rand(0, 0.4),
    flickerSpeed:      rand(0.3, 12),
  });
  document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
  setStatus('Randomized all');
}

function randomizeColors() {
  const lc  = randomNeonColor();
  const lcB = randomNeonColor();
  const gc  = mutateColor(lc, 0.25);
  const gcB = mutateColor(lcB, 0.25);
  const dur = +document.getElementById('slMorphDur').value;
  anim.morphTo({ lineColor: lc, lineColorB: lcB, glowColor: gc, glowColorB: gcB }, dur);
  document.getElementById('colLine').value  = '#' + lc.toString(16).padStart(6, '0');
  document.getElementById('colLineB').value = '#' + lcB.toString(16).padStart(6, '0');
  document.getElementById('colGlow').value  = '#' + gc.toString(16).padStart(6, '0');
  document.getElementById('colGlowB').value = '#' + gcB.toString(16).padStart(6, '0');
  setStatus('Randomized colors');
}

function randomizeTiming() {
  const cfg = {
    durationMs:   randInt(400, 5000),
    stagger:      rand(0, 1),
    jitter:       rand(0, 60),
    ringFade: rand(0.05, 0.75),
    direction:    randChoice(['south-to-north', 'north-to-south', 'equator-out']),
    easingKey:    randChoice(Object.keys(EASINGS)),
  };
  anim._options.durationMs = cfg.durationMs;
  anim._options.easingFn   = EASINGS[cfg.easingKey];
  anim.morphTo({ stagger: cfg.stagger, jitter: cfg.jitter, ringFade: cfg.ringFade }, +document.getElementById('slMorphDur').value);
  syncUI(cfg);
  setStatus('Randomized timing');
}

function randomizeShape() {
  const cfg = {
    numRings:     randInt(4, 110),
    warpAmount:   rand(0, 0.6),
    ringFade: rand(0.05, 0.75),
    stagger:      rand(0, 1),
  };
  anim.morphTo({ warpAmount: cfg.warpAmount, stagger: cfg.stagger, ringFade: cfg.ringFade, numRings: cfg.numRings }, +document.getElementById('slMorphDur').value);
  syncUI(cfg);
  if (cfg.numRings) { document.getElementById('slNumRings').value = cfg.numRings; document.getElementById('vNumRings').textContent = cfg.numRings; }
  setStatus('Randomized shape');
}

// ── Mutate (nudge current values) ─────────────────────────────────────────
function mutateAll(pct) {
  const str = pct / 100;
  const opts = anim._options;
  const lc  = mutateColor(opts.lineColor,  str);
  const lcB = mutateColor(opts.lineColorB ?? opts.lineColor, str);
  const gc  = mutateColor(opts.glowColor,  str);
  const gcB = mutateColor(opts.glowColorB ?? opts.glowColor, str);
  const cfg = {
    lineColor:         lc,
    lineColorB:        lcB,
    glowColor:         gc,
    glowColorB:        gcB,
    opacity:           nudge(opts.opacity,           0.1, 1.0,  str),
    glowOpacity:       nudge(opts.glowOpacity,       0.0, 0.6,  str),
    emissiveIntensity: nudge(opts.emissiveIntensity, 0.4, 15.0,  str),
    stagger:           nudge(opts.stagger,           0.0, 1.0,   str),
    jitter:            nudge(opts.jitter,            0,   200,   str),
    warpAmount:        nudge(opts.warpAmount,        -2.0, 2.0,  str),
    ringFade:      nudge(opts.ringFade,      0.05, 0.75, str),
    colorSpread:       nudge(opts.colorSpread,       0.0, 0.5,   str),
    brightSpread:      nudge(opts.brightSpread,      0.0, 0.5,   str),
    flickerAmp:        nudge(opts.flickerAmp,        0.0, 0.4,   str),
    flickerSpeed:      nudge(opts.flickerSpeed,      0.2, 12.0,  str),
  };
  anim.morphTo(cfg, 400);
  syncUI(cfg);
  document.getElementById('colLine').value  = '#' + lc.toString(16).padStart(6, '0');
  document.getElementById('colLineB').value = '#' + lcB.toString(16).padStart(6, '0');
  document.getElementById('colGlow').value  = '#' + gc.toString(16).padStart(6, '0');
  document.getElementById('colGlowB').value = '#' + gcB.toString(16).padStart(6, '0');
  setStatus('Mutated');
}

function mutateColors(pct) {
  const str  = pct / 100;
  const opts = anim._options;
  const lc   = mutateColor(opts.lineColor,  str);
  const lcB  = mutateColor(opts.lineColorB ?? opts.lineColor, str);
  const gc   = mutateColor(opts.glowColor,  str);
  const gcB  = mutateColor(opts.glowColorB ?? opts.glowColor, str);
  const dur  = +document.getElementById('slMorphDur').value;
  anim.morphTo({ lineColor: lc, lineColorB: lcB, glowColor: gc, glowColorB: gcB }, dur);
  document.getElementById('colLine').value  = '#' + lc.toString(16).padStart(6, '0');
  document.getElementById('colLineB').value = '#' + lcB.toString(16).padStart(6, '0');
  document.getElementById('colGlow').value  = '#' + gc.toString(16).padStart(6, '0');
  document.getElementById('colGlowB').value = '#' + gcB.toString(16).padStart(6, '0');
  setStatus('Mutated colors');
}

function mutateTiming(pct) {
  const str = pct / 100;
  const opts = anim._options;
  const stagger      = nudge(opts.stagger,      0,    1,    str);
  const jitter       = nudge(opts.jitter,       0,    200,  str);
  const ringFade = nudge(opts.ringFade, 0.05, 0.75, str);
  const warpAmount   = nudge(opts.warpAmount,   -2.0, 2.0,  str);
  const flickerAmp   = nudge(opts.flickerAmp,   0,    0.4,  str);
  const flickerSpeed = nudge(opts.flickerSpeed, 0.2,  12,   str);
  anim.morphTo({ stagger, jitter, ringFade, warpAmount, flickerAmp, flickerSpeed }, +document.getElementById('slMorphDur').value);
  syncUI({ stagger, jitter, ringFade, warpAmount, flickerAmp, flickerSpeed });
  setStatus('Mutated timing');
}

document.getElementById('btnRandAll').addEventListener('click',     randomizeAll);
document.getElementById('btnRandColors').addEventListener('click',  randomizeColors);

document.getElementById('btnMutateTiming').addEventListener('click',() => mutateTiming(+document.getElementById('slMutateStr').value));

// ── Status bar ─────────────────────────────────────────────────────────────
let statusTimer = null;
function setStatus(msg) {
  document.getElementById('status-bar').textContent = msg;
  clearTimeout(statusTimer);
  statusTimer = setTimeout(() => { document.getElementById('status-bar').textContent = ''; }, 2000);
}

// ── Resize ─────────────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
  composer.setSize(innerWidth, innerHeight);
  anim.setResolution(innerWidth, innerHeight);
  icoMat.resolution.set(innerWidth, innerHeight);
});

// ── Helpers ────────────────────────────────────────────────────────────────
function syncProgress(p) {
  slProgress.value = Math.round(p * 1000);
  vProgress.textContent = p.toFixed(3);
}

// ── RAF ────────────────────────────────────────────────────────────────────
const clock = new THREE.Timer();
renderer.setAnimationLoop(() => {
  clock.update();
  const dt = Math.min(clock.getDelta() * 1000, 100); // cap at 100ms to prevent huge jumps
  anim.tick(dt);
  if (!scrubbing) syncProgress(anim.progress);
  controls.update();
  composer.render();
});
</script>
