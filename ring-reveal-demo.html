<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>RingRevealAnimator Demo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; font-family: monospace; }
    canvas { display: block; }

    #ui {
      position: fixed;
      top: 16px;
      left: 16px;
      color: #0ff;
      font-size: 12px;
      display: flex;
      flex-direction: column;
      gap: 5px;
      width: 320px;
      max-height: calc(100vh - 32px);
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: #0ff3 transparent;
      padding-right: 4px;
    }

    .section-label {
      color: #0ff9;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-top: 6px;
      border-bottom: 1px solid #0ff2;
      padding-bottom: 3px;
    }

    #ui label {
      display: flex;
      align-items: center;
      gap: 8px;
      white-space: nowrap;
    }

    #ui label span.lname {
      min-width: 116px;
      color: #0ffc;
    }

    #ui input[type=range] {
      width: 110px;
      accent-color: #0ff;
      cursor: pointer;
    }

    #ui input[type=color] {
      width: 34px;
      height: 20px;
      border: 1px solid #0ff4;
      background: transparent;
      cursor: pointer;
      padding: 1px;
    }

    #ui select {
      background: #001a1a;
      color: #0ff;
      border: 1px solid #0ff4;
      font-family: monospace;
      font-size: 12px;
      padding: 2px 5px;
      cursor: pointer;
      flex: 1;
      min-width: 0;
    }

    .val {
      min-width: 36px;
      text-align: right;
      color: #0ff;
    }

    .btn-row { display: flex; gap: 5px; flex-wrap: wrap; }

    #ui button {
      background: #001a1a;
      color: #0ff;
      border: 1px solid #0ff4;
      padding: 3px 9px;
      cursor: pointer;
      font-family: monospace;
      font-size: 11px;
      white-space: nowrap;
    }
    #ui button:hover  { background: #003333; }
    #ui button.active { background: #004444; border-color: #0ff; }
    #ui button.preset-btn.active { border-color: #0ff; background: #003344; }

    /* preset grid */
    .preset-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 4px;
    }
    .preset-grid button {
      font-size: 10px;
      padding: 4px 2px;
      text-align: center;
    }

    #progress-track {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 10px;
      color: #0ff;
      font-size: 12px;
      font-family: monospace;
    }
    #progress-track input[type=range] {
      width: 260px;
      accent-color: #0ff;
      cursor: pointer;
    }
    #progress-track span { min-width: 38px; }

    #status-bar {
      position: fixed;
      bottom: 52px;
      left: 50%;
      transform: translateX(-50%);
      color: #0ff6;
      font-size: 11px;
      font-family: monospace;
      white-space: nowrap;
      pointer-events: none;
    }
  </style>
</head>
<body>

<div id="ui">

  <!-- Playback -->
  <div class="section-label">Playback</div>
  <div class="btn-row">
    <button id="btnPlay">&#9654; Play</button>
    <button id="btnReverse">&#9664; Rev</button>
    <button id="btnStop">&#10074;&#10074; Stop</button>
    <button id="btnReset">&#8635; Reset</button>
  </div>

  <!-- Loop -->
  <div class="section-label">Loop</div>
  <label>
    <span class="lname">Mode</span>
    <select id="selLoopMode">
      <option value="play-reverse">Play &harr; Reverse</option>
      <option value="play-reset">Play &rarr; Reset</option>
      <option value="preset-cycle">Preset cycle</option>
      <option value="mutate-loop">Mutate loop</option>
    </select>
  </label>
  <div class="btn-row">
    <button id="btnLoop">&#8635; Loop</button>
    <button id="btnLoopOnce">&#8594; Once</button>
  </div>
  <label>
    <span class="lname">Pause between</span>
    <input type="range" id="slPause" min="0" max="3000" step="100" value="0">
    <span class="val" id="vPause">0</span> ms
  </label>

  <!-- Animation -->
  <div class="section-label">Animation</div>
  <label>
    <span class="lname">Direction</span>
    <select id="selDirection">
      <option value="south-to-north" selected>south &rarr; north</option>
      <option value="north-to-south">north &rarr; south</option>
      <option value="equator-out">equator out</option>
    </select>
  </label>
  <label>
    <span class="lname">Easing</span>
    <select id="selEasing">
      <option value="easeInOutCubic" selected>easeInOutCubic</option>
      <option value="easeOutExpo">easeOutExpo</option>
      <option value="backInOut">backInOut</option>
      <option value="linear">linear</option>
    </select>
  </label>
  <label>
    <span class="lname">Duration</span>
    <input type="range" id="slDuration" min="200" max="6000" step="100" value="1800">
    <span class="val" id="vDuration">1800</span> ms
  </label>
  <label>
    <span class="lname">Stagger</span>
    <input type="range" id="slStagger" min="0" max="100" value="40">
    <span class="val" id="vStagger">0.40</span>
  </label>
  <label>
    <span class="lname">Ring duration</span>
    <input type="range" id="slRingDur" min="1" max="99" value="35">
    <span class="val" id="vRingDur">0.35</span>
  </label>

  <!-- Geometry -->
  <div class="section-label">Geometry</div>
  <label>
    <span class="lname">Num rings</span>
    <input type="range" id="slNumRings" min="2" max="120" value="48">
    <span class="val" id="vNumRings">48</span>
  </label>
  <label>
    <span class="lname">Samples/ring</span>
    <input type="range" id="slSamples" min="8" max="512" step="8" value="256">
    <span class="val" id="vSamples">256</span>
  </label>
  <label>
    <span class="lname">Radius</span>
    <input type="range" id="slRadius" min="50" max="200" value="103">
    <span class="val" id="vRadius">1.030</span>
  </label>

  <!-- Ring Variation -->
  <div class="section-label">Ring Variation</div>
  <label>
    <span class="lname">Color spread</span>
    <input type="range" id="slColorSpread" min="0" max="100" value="0">
    <span class="val" id="vColorSpread">0.00</span>
  </label>
  <label>
    <span class="lname">Bright spread</span>
    <input type="range" id="slBrightSpread" min="0" max="100" value="0">
    <span class="val" id="vBrightSpread">0.00</span>
  </label>
  <label>
    <span class="lname">Flicker amp</span>
    <input type="range" id="slFlickerAmp" min="0" max="100" value="0">
    <span class="val" id="vFlickerAmp">0.00</span>
  </label>
  <label>
    <span class="lname">Flicker speed</span>
    <input type="range" id="slFlickerSpeed" min="1" max="300" value="20">
    <span class="val" id="vFlickerSpeed">2.0</span> Hz
  </label>

  <!-- Appearance -->
  <div class="section-label">Appearance</div>
  <label>
    <span class="lname">Line color</span>
    <input type="color" id="colLine" value="#00ffcc">
  </label>
  <label>
    <span class="lname">Glow color</span>
    <input type="color" id="colGlow" value="#00ffcc">
  </label>
  <label>
    <span class="lname">Opacity</span>
    <input type="range" id="slOpacity" min="0" max="100" value="70">
    <span class="val" id="vOpacity">0.70</span>
  </label>
  <label>
    <span class="lname">Glow opacity</span>
    <input type="range" id="slGlowOpacity" min="0" max="100" value="25">
    <span class="val" id="vGlowOpacity">0.25</span>
  </label>
  <label>
    <span class="lname">Emissive</span>
    <input type="range" id="slEmissive" min="10" max="600" value="150">
    <span class="val" id="vEmissive">1.50</span>
  </label>
  <label>
    <span class="lname">Glow radius</span>
    <input type="range" id="slGlowRad" min="100" max="120" value="108">
    <span class="val" id="vGlowRad">1.008</span>
  </label>
  <label>
    <span class="lname">Warp amount</span>
    <input type="range" id="slWarp" min="0" max="80" value="12">
    <span class="val" id="vWarp">0.12</span>
  </label>

  <!-- Presets -->
  <div class="section-label">Presets</div>
  <div class="preset-grid" id="presetGrid"></div>
  <label>
    <span class="lname">Morph duration</span>
    <input type="range" id="slMorphDur" min="0" max="3000" step="50" value="800">
    <span class="val" id="vMorphDur">800</span> ms
  </label>

  <!-- Randomize -->
  <div class="section-label">Randomize / Mutate</div>
  <div class="btn-row">
    <button id="btnRandAll">* All</button>
    <button id="btnRandColors">* Colors</button>
    <button id="btnRandTiming">* Timing</button>
    <button id="btnRandShape">* Shape</button>
  </div>
  <div class="btn-row">
    <button id="btnMutate">~ Mutate</button>
    <button id="btnMutateColors">~ Colors</button>
    <button id="btnMutateTiming">~ Timing</button>
  </div>
  <label>
    <span class="lname">Mutate strength</span>
    <input type="range" id="slMutateStr" min="2" max="60" value="15">
    <span class="val" id="vMutateStr">15%</span>
  </label>

  <!-- Scene -->
  <div class="section-label">Scene</div>
  <label>
    <span class="lname">Sphere</span>
    <select id="selSphere">
      <option value="wire" selected>Wireframe</option>
      <option value="solid">Solid</option>
      <option value="none">Hidden</option>
    </select>
  </label>
  <label>
    <span class="lname">Bloom strength</span>
    <input type="range" id="slBloom" min="0" max="400" value="120">
    <span class="val" id="vBloom">1.20</span>
  </label>

</div>

<!-- Status + progress -->
<div id="status-bar"></div>
<div id="progress-track">
  <span>Progress</span>
  <input type="range" id="slProgress" min="0" max="1000" value="0">
  <span id="vProgress">0.000</span>
</div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';
import { RingRevealAnimator } from './components/ring-reveal/index.js';
import { easeInOutCubic, easeOutExpo, backInOut, linear } from './components/ring-reveal/easings.js';

// ── Scene ──────────────────────────────────────────────────────────────────
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x020808);

const camera = new THREE.PerspectiveCamera(45, innerWidth / innerHeight, 0.1, 100);
camera.position.set(0, 0, 3.5);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.autoRotate = true;
controls.autoRotateSpeed = 0.6;

// ── Post-processing ────────────────────────────────────────────────────────
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
const bloomPass = new UnrealBloomPass(new THREE.Vector2(innerWidth, innerHeight), 1.2, 0.4, 0.28);
composer.addPass(bloomPass);
composer.addPass(new OutputPass());

// ── Reference globe ────────────────────────────────────────────────────────
const globeGeo  = new THREE.SphereGeometry(1.0, 48, 48);
const wireMat   = new THREE.MeshBasicMaterial({ color: 0x00ffcc, wireframe: true, transparent: true, opacity: 0.05 });
const solidMat  = new THREE.MeshStandardMaterial({ color: 0x001a14, roughness: 0.8, metalness: 0.1, transparent: true, opacity: 0.85 });
const hiddenMat = new THREE.MeshBasicMaterial({ visible: false });
const globeMesh = new THREE.Mesh(globeGeo, wireMat);
scene.add(globeMesh);

scene.add(new THREE.AmbientLight(0xffffff, 0.3));
const dirLight = new THREE.DirectionalLight(0x00ffcc, 1.2);
dirLight.position.set(2, 3, 2);
scene.add(dirLight);

// ── Easing map ─────────────────────────────────────────────────────────────
const EASINGS = { easeInOutCubic, easeOutExpo, backInOut, linear };

// ── Preset definitions ─────────────────────────────────────────────────────
const PRESETS = {
  default:   { label: 'Default',   lineColor: 0x00ffcc, glowColor: 0x00ffcc, opacity: 0.70, glowOpacity: 0.25, emissiveIntensity: 1.5,  stagger: 0.55, warpAmount: 0.12, numRings: 48, direction: 'south-to-north', easingKey: 'easeInOutCubic', durationMs: 1800, ringDuration: 0.35 },
  alert:     { label: 'Alert',     lineColor: 0xff6600, glowColor: 0xff2200, opacity: 0.90, glowOpacity: 0.45, emissiveIntensity: 3.0,  stagger: 0.80, warpAmount: 0.18, numRings: 48, direction: 'south-to-north', easingKey: 'backInOut',      durationMs: 1400, ringDuration: 0.30, colorSpread: 0.08, brightSpread: 0.20, flickerAmp: 0.15, flickerSpeed: 4.0 },
  dense:     { label: 'Dense',     lineColor: 0x00ffcc, glowColor: 0x00ff88, opacity: 0.45, glowOpacity: 0.12, emissiveIntensity: 1.2,  stagger: 0.30, warpAmount: 0.06, numRings: 96, direction: 'south-to-north', easingKey: 'easeInOutCubic', durationMs: 2400, ringDuration: 0.40, colorSpread: 0.00, brightSpread: 0.00, flickerAmp: 0.00, flickerSpeed: 2.0 },
  ghost:     { label: 'Ghost',     lineColor: 0x88ccff, glowColor: 0x4499ff, opacity: 0.35, glowOpacity: 0.08, emissiveIntensity: 0.8,  stagger: 0.70, warpAmount: 0.35, numRings: 16, direction: 'north-to-south', easingKey: 'easeOutExpo',    durationMs: 3200, ringDuration: 0.50, colorSpread: 0.12, brightSpread: 0.30, flickerAmp: 0.08, flickerSpeed: 0.8 },
  scanner:   { label: 'Scanner',   lineColor: 0x00ff44, glowColor: 0x00cc33, opacity: 0.85, glowOpacity: 0.30, emissiveIntensity: 2.5,  stagger: 0.95, warpAmount: 0.04, numRings: 32, direction: 'equator-out',    easingKey: 'easeOutExpo',    durationMs:  900, ringDuration: 0.20, colorSpread: 0.10, brightSpread: 0.00, flickerAmp: 0.00, flickerSpeed: 2.0 },
  cosmic:    { label: 'Cosmic',    lineColor: 0x8844ff, glowColor: 0x4422cc, opacity: 0.70, glowOpacity: 0.35, emissiveIntensity: 2.2,  stagger: 0.50, warpAmount: 0.20, numRings: 64, direction: 'equator-out',    easingKey: 'easeInOutCubic', durationMs: 2500, ringDuration: 0.35, colorSpread: 0.25, brightSpread: 0.20, flickerAmp: 0.05, flickerSpeed: 1.5 },
  ignition:  { label: 'Ignition',  lineColor: 0xffaa00, glowColor: 0xff4400, opacity: 0.95, glowOpacity: 0.55, emissiveIntensity: 4.0,  stagger: 0.90, warpAmount: 0.40, numRings: 40, direction: 'south-to-north', easingKey: 'backInOut',      durationMs:  900, ringDuration: 0.28, colorSpread: 0.15, brightSpread: 0.35, flickerAmp: 0.20, flickerSpeed: 6.0 },
  neon:      { label: 'Neon',      lineColor: 0xff00ff, glowColor: 0x00ffff, opacity: 0.80, glowOpacity: 0.40, emissiveIntensity: 3.5,  stagger: 0.60, warpAmount: 0.15, numRings: 56, direction: 'south-to-north', easingKey: 'easeOutExpo',    durationMs: 1600, ringDuration: 0.32, colorSpread: 0.30, brightSpread: 0.15, flickerAmp: 0.10, flickerSpeed: 3.0 },
  stealth:   { label: 'Stealth',   lineColor: 0x003322, glowColor: 0x004433, opacity: 0.30, glowOpacity: 0.06, emissiveIntensity: 0.6,  stagger: 0.20, warpAmount: 0.03, numRings: 24, direction: 'north-to-south', easingKey: 'linear',         durationMs: 4000, ringDuration: 0.45, colorSpread: 0.00, brightSpread: 0.00, flickerAmp: 0.00, flickerSpeed: 2.0 },
  solar:     { label: 'Solar',     lineColor: 0xffff00, glowColor: 0xff8800, opacity: 0.75, glowOpacity: 0.50, emissiveIntensity: 5.0,  stagger: 1.00, warpAmount: 0.08, numRings: 48, direction: 'equator-out',    easingKey: 'easeOutExpo',    durationMs: 1200, ringDuration: 0.25, colorSpread: 0.20, brightSpread: 0.40, flickerAmp: 0.25, flickerSpeed: 2.5 },
  wisp:      { label: 'Wisp',      lineColor: 0xffffff, glowColor: 0xaaccff, opacity: 0.20, glowOpacity: 0.05, emissiveIntensity: 0.5,  stagger: 0.85, warpAmount: 0.55, numRings:  8, direction: 'equator-out',    easingKey: 'easeOutExpo',    durationMs: 5000, ringDuration: 0.60, colorSpread: 0.15, brightSpread: 0.50, flickerAmp: 0.12, flickerSpeed: 0.5 },
  pulse:     { label: 'Pulse',     lineColor: 0xff0066, glowColor: 0xff0033, opacity: 0.95, glowOpacity: 0.60, emissiveIntensity: 6.0,  stagger: 1.00, warpAmount: 0.25, numRings: 48, direction: 'equator-out',    easingKey: 'backInOut',      durationMs:  700, ringDuration: 0.15, colorSpread: 0.05, brightSpread: 0.10, flickerAmp: 0.30, flickerSpeed: 8.0 },
  arctic:    { label: 'Arctic',    lineColor: 0x00eeff, glowColor: 0x88ffff, opacity: 0.55, glowOpacity: 0.20, emissiveIntensity: 1.8,  stagger: 0.45, warpAmount: 0.10, numRings: 36, direction: 'north-to-south', easingKey: 'easeInOutCubic', durationMs: 2200, ringDuration: 0.38, colorSpread: 0.08, brightSpread: 0.25, flickerAmp: 0.06, flickerSpeed: 1.2 },
  grid:      { label: 'Grid',      lineColor: 0x00ffcc, glowColor: 0x00ffcc, opacity: 0.60, glowOpacity: 0.15, emissiveIntensity: 1.0,  stagger: 0.00, warpAmount: 0.00, numRings: 48, direction: 'south-to-north', easingKey: 'linear',         durationMs: 2000, ringDuration: 0.08, colorSpread: 0.00, brightSpread: 0.00, flickerAmp: 0.00, flickerSpeed: 2.0 },
  ember:     { label: 'Ember',     lineColor: 0xff3300, glowColor: 0xff9900, opacity: 0.65, glowOpacity: 0.30, emissiveIntensity: 2.8,  stagger: 0.65, warpAmount: 0.30, numRings: 28, direction: 'south-to-north', easingKey: 'backInOut',      durationMs: 2800, ringDuration: 0.55, colorSpread: 0.12, brightSpread: 0.35, flickerAmp: 0.08, flickerSpeed: 1.8 },
};

const PRESET_KEYS = Object.keys(PRESETS);

// ── Build preset grid buttons ──────────────────────────────────────────────
const presetGrid = document.getElementById('presetGrid');
let activePresetKey = 'default';
PRESET_KEYS.forEach(key => {
  const btn = document.createElement('button');
  btn.className = 'preset-btn';
  btn.id = `preset-${key}`;
  btn.textContent = PRESETS[key].label;
  btn.addEventListener('click', () => applyPreset(key, true));
  presetGrid.appendChild(btn);
});
document.getElementById('preset-default').classList.add('active');

// ── Build animator ─────────────────────────────────────────────────────────
let anim = null;

function getOptions() {
  return {
    radius:            +document.getElementById('slRadius').value / 100,
    numRings:          +document.getElementById('slNumRings').value,
    samplesPerRing:    +document.getElementById('slSamples').value,
    durationMs:        +document.getElementById('slDuration').value,
    direction:         document.getElementById('selDirection').value,
    stagger:           +document.getElementById('slStagger').value / 100,
    ringDuration:      +document.getElementById('slRingDur').value / 100,
    easingFn:          EASINGS[document.getElementById('selEasing').value],
    lineColor:         parseInt(document.getElementById('colLine').value.slice(1), 16),
    glowColor:         parseInt(document.getElementById('colGlow').value.slice(1), 16),
    opacity:           +document.getElementById('slOpacity').value / 100,
    glowOpacity:       +document.getElementById('slGlowOpacity').value / 100,
    emissiveIntensity: +document.getElementById('slEmissive').value / 100,
    warpAmount:        +document.getElementById('slWarp').value / 100,
    glowRadius:        +document.getElementById('slGlowRad').value / 100,
    colorSpread:       +document.getElementById('slColorSpread').value / 100,
    brightSpread:      +document.getElementById('slBrightSpread').value / 100,
    flickerAmp:        +document.getElementById('slFlickerAmp').value / 100,
    flickerSpeed:      +document.getElementById('slFlickerSpeed').value / 10,
    morphDurationMs:   +document.getElementById('slMorphDur').value,
  };
}

function buildAnim() {
  if (anim) { anim.dispose(); anim = null; }
  anim = new RingRevealAnimator(scene, getOptions());
  anim.baseRings.renderOrder = 4;
  anim.glowRings.renderOrder = 4;
}

buildAnim();

// ── Sync all UI sliders/inputs from a flat config object ───────────────────
function syncUI(cfg) {
  if (cfg.lineColor !== undefined) {
    document.getElementById('colLine').value = '#' + cfg.lineColor.toString(16).padStart(6, '0');
  }
  if (cfg.glowColor !== undefined) {
    document.getElementById('colGlow').value = '#' + cfg.glowColor.toString(16).padStart(6, '0');
  }
  const set = (id, v, display, toDisp) => {
    if (v === undefined) return;
    document.getElementById(id).value = v;
    if (display) document.getElementById(display).textContent = toDisp ? toDisp(v) : v;
  };
  set('slOpacity',     cfg.opacity    !== undefined ? Math.round(cfg.opacity    * 100) : undefined, 'vOpacity',     v => (v / 100).toFixed(2));
  set('slGlowOpacity', cfg.glowOpacity !== undefined ? Math.round(cfg.glowOpacity * 100) : undefined, 'vGlowOpacity', v => (v / 100).toFixed(2));
  set('slEmissive',    cfg.emissiveIntensity !== undefined ? Math.round(cfg.emissiveIntensity * 100) : undefined, 'vEmissive', v => (v / 100).toFixed(2));
  set('slStagger',     cfg.stagger    !== undefined ? Math.round(cfg.stagger    * 100) : undefined, 'vStagger',     v => (v / 100).toFixed(2));
  set('slWarp',        cfg.warpAmount !== undefined ? Math.round(cfg.warpAmount * 100) : undefined, 'vWarp',        v => (v / 100).toFixed(2));
  set('slNumRings',    cfg.numRings,                                                                 'vNumRings');
  set('slColorSpread',  cfg.colorSpread  !== undefined ? Math.round(cfg.colorSpread  * 100) : undefined, 'vColorSpread',  v => (v / 100).toFixed(2));
  set('slBrightSpread', cfg.brightSpread !== undefined ? Math.round(cfg.brightSpread * 100) : undefined, 'vBrightSpread', v => (v / 100).toFixed(2));
  set('slFlickerAmp',   cfg.flickerAmp   !== undefined ? Math.round(cfg.flickerAmp   * 100) : undefined, 'vFlickerAmp',   v => (v / 100).toFixed(2));
  set('slFlickerSpeed', cfg.flickerSpeed !== undefined ? Math.round(cfg.flickerSpeed * 10)  : undefined, 'vFlickerSpeed', v => (v / 10).toFixed(1));
  if (cfg.ringDuration !== undefined) {
    const v = Math.max(0.001, cfg.ringDuration);
    set('slRingDur', Math.round(v * 100), 'vRingDur', x => (x / 100).toFixed(2));
    // Uniforms not written here — morphTo owns uRingDuration and applies it via
    // _applyMorphT. Writing here causes a jump-back glitch on the first morph tick.
  }
  set('slDuration',    cfg.durationMs,                                                               'vDuration');
  if (cfg.direction) {
    document.getElementById('selDirection').value = cfg.direction;
    const dirMap = { 'south-to-north': 0, 'north-to-south': 1, 'equator-out': 2 };
    const d = dirMap[cfg.direction] ?? 0;
    if (anim) {
      anim._baseRings.material.uniforms.uDirection.value = d;
      anim._glowRings.material.uniforms.uDirection.value = d;
    }
  }
  if (cfg.easingKey) {
    document.getElementById('selEasing').value = cfg.easingKey;
    if (anim) anim._options.easingFn = EASINGS[cfg.easingKey];
  }
}

// ── Apply a named preset ───────────────────────────────────────────────────
function applyPreset(key, withMorph = true) {
  const p = PRESETS[key];
  if (!p) return;

  // Update active button highlight
  document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(`preset-${key}`)?.classList.add('active');
  activePresetKey = key;

  // Immediate non-morphable params
  syncUI({ direction: p.direction, easingKey: p.easingKey, durationMs: p.durationMs });
  anim._options.durationMs = p.durationMs;

  const dur = withMorph ? +document.getElementById('slMorphDur').value : 0;

  anim.morphTo({
    lineColor:         p.lineColor,
    glowColor:         p.glowColor,
    opacity:           p.opacity,
    glowOpacity:       p.glowOpacity,
    emissiveIntensity: p.emissiveIntensity,
    stagger:           p.stagger,
    warpAmount:        p.warpAmount,
    numRings:          p.numRings,
    ringDuration:      p.ringDuration,
    colorSpread:       p.colorSpread  ?? 0,
    brightSpread:      p.brightSpread ?? 0,
    flickerAmp:        p.flickerAmp   ?? 0,
    flickerSpeed:      p.flickerSpeed ?? 2.0,
  }, dur);

  syncUI(p);
  setStatus(`Preset: ${p.label}`);
}

// ── Progress scrubber ──────────────────────────────────────────────────────
let scrubbing = false;
const slProgress = document.getElementById('slProgress');
const vProgress  = document.getElementById('vProgress');

slProgress.addEventListener('mousedown', () => { scrubbing = true; anim.stop(); });
slProgress.addEventListener('touchstart', () => { scrubbing = true; anim.stop(); }, { passive: true });

// ── Loop state ─────────────────────────────────────────────────────────────
let looping = false;
let loopTimer = null;

function clearLoopTimer() {
  if (loopTimer !== null) { clearTimeout(loopTimer); loopTimer = null; }
}

function pauseThen(ms, fn) {
  clearLoopTimer();
  if (ms <= 0) fn();
  else loopTimer = setTimeout(fn, ms);
}

function getLoopPause() { return +document.getElementById('slPause').value; }

// Each loop mode returns a function that starts one "cycle" and calls done() when it ends.
function runLoopCycle(done) {
  const mode = document.getElementById('selLoopMode').value;
  const pause = getLoopPause();

  if (mode === 'play-reverse') {
    anim.reset();
    anim.play(() => pauseThen(pause, () => {
      if (!looping) return;
      anim.reverse(() => pauseThen(pause, done));
    }));

  } else if (mode === 'play-reset') {
    anim.reset();
    anim.play(() => pauseThen(pause, done));

  } else if (mode === 'preset-cycle') {
    const idx = PRESET_KEYS.indexOf(activePresetKey);
    const nextKey = PRESET_KEYS[(idx + 1) % PRESET_KEYS.length];
    applyPreset(nextKey, true);
    // Wait for morph then play
    const morphDur = +document.getElementById('slMorphDur').value;
    pauseThen(morphDur + 50, () => {
      if (!looping) return;
      anim.reset();
      anim.play(() => pauseThen(pause, done));
    });

  } else if (mode === 'mutate-loop') {
    anim.reset();
    anim.play(() => pauseThen(pause, () => {
      if (!looping) return;
      anim.reverse(() => {
        if (!looping) return;
        pauseThen(pause, () => {
          mutateAll(+document.getElementById('slMutateStr').value);
          pauseThen(450, done); // allow 400ms mutation morph to complete before reset()
        });
      });
    }));
  }
}

function startLoop() {
  if (!looping) return;
  runLoopCycle(() => { if (looping) startLoop(); });
}

function stopLoop() {
  looping = false;
  clearLoopTimer();
  anim.stop();
  document.getElementById('btnLoop').classList.remove('active');
}

document.getElementById('btnLoop').addEventListener('click', () => {
  looping = !looping;
  document.getElementById('btnLoop').classList.toggle('active', looping);
  if (looping) startLoop();
  else stopLoop();
});

// Run a single cycle then stop
document.getElementById('btnLoopOnce').addEventListener('click', () => {
  stopLoop();
  looping = true; // needed so runLoopCycle internal checks pass
  runLoopCycle(() => { looping = false; setStatus('Done'); });
});

// ── Geometry params (rebuild on commit) ───────────────────────────────────
function rebuildGeom() {
  const progress = anim._progress;
  const playing  = anim._playing;
  buildAnim();
  anim._progress = progress;
  anim._elapsed  = progress * anim._options.durationMs;
  anim._setProgress(progress);
  if (playing) anim.play();
}

// ── Randomize helpers ──────────────────────────────────────────────────────
function rand(min, max) { return min + Math.random() * (max - min); }
function randInt(min, max) { return Math.round(rand(min, max)); }
function randChoice(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

// Vivid random color: random hue, high saturation, mid-high lightness
function randomNeonColor() {
  const h = Math.random();
  const s = rand(0.7, 1.0);
  const l = rand(0.45, 0.65);
  const c = new THREE.Color().setHSL(h, s, l);
  return Math.round(c.r * 255) << 16 | Math.round(c.g * 255) << 8 | Math.round(c.b * 255);
}

// Slightly shift a color by ±hue/sat/light delta
function mutateColor(hex, strength) {
  const c = new THREE.Color(hex);
  const hsl = {};
  c.getHSL(hsl);
  const h = (hsl.h + rand(-strength, strength) * 0.15 + 1) % 1;
  const s = Math.max(0.2, Math.min(1, hsl.s + rand(-strength, strength) * 0.3));
  const l = Math.max(0.2, Math.min(0.85, hsl.l + rand(-strength, strength) * 0.2));
  const out = new THREE.Color().setHSL(h, s, l);
  return (Math.round(out.r * 255) << 16) | (Math.round(out.g * 255) << 8) | Math.round(out.b * 255);
}

function clampN(v, min, max) { return Math.max(min, Math.min(max, v)); }

// nudge a value by ±strength% of its range
function nudge(val, min, max, strength) {
  const range = max - min;
  return clampN(val + rand(-1, 1) * strength * range, min, max);
}

// Apply a config diff immediately (no morph, used for randomize)
function applyImmediate(cfg) {
  stopLoop();
  anim.morphTo(cfg, 0); // numRings change handled by cross-fade inside morphTo
  syncUI(cfg);
  if (cfg.numRings)       { document.getElementById('slNumRings').value = cfg.numRings; document.getElementById('vNumRings').textContent = cfg.numRings; }
  if (cfg.samplesPerRing) { document.getElementById('slSamples').value = cfg.samplesPerRing; document.getElementById('vSamples').textContent = cfg.samplesPerRing; }
}

// ── Randomize All ──────────────────────────────────────────────────────────
function randomizeAll() {
  const lc = randomNeonColor();
  const gc = mutateColor(lc, 0.3);
  applyImmediate({
    lineColor:         lc,
    glowColor:         gc,
    opacity:           rand(0.3, 0.95),
    glowOpacity:       rand(0.05, 0.55),
    emissiveIntensity: rand(0.5, 5.0),
    stagger:           rand(0, 1),
    warpAmount:        rand(0, 0.5),
    numRings:          randInt(6, 100),
    ringDuration:      rand(0.08, 0.70),
    direction:         randChoice(['south-to-north', 'north-to-south', 'equator-out']),
    easingKey:         randChoice(Object.keys(EASINGS)),
    durationMs:        randInt(600, 5000),
    colorSpread:       rand(0, 0.5),
    brightSpread:      rand(0, 0.5),
    flickerAmp:        rand(0, 0.4),
    flickerSpeed:      rand(0.3, 12),
  });
  document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
  setStatus('Randomized all');
}

function randomizeColors() {
  const lc = randomNeonColor();
  const gc = mutateColor(lc, 0.25);
  anim.morphTo({ lineColor: lc, glowColor: gc }, +document.getElementById('slMorphDur').value);
  document.getElementById('colLine').value = '#' + lc.toString(16).padStart(6, '0');
  document.getElementById('colGlow').value = '#' + gc.toString(16).padStart(6, '0');
  setStatus('Randomized colors');
}

function randomizeTiming() {
  const cfg = {
    durationMs:   randInt(400, 5000),
    stagger:      rand(0, 1),
    ringDuration: rand(0.05, 0.75),
    direction:    randChoice(['south-to-north', 'north-to-south', 'equator-out']),
    easingKey:    randChoice(Object.keys(EASINGS)),
  };
  anim._options.durationMs = cfg.durationMs;
  anim._options.easingFn   = EASINGS[cfg.easingKey];
  anim.morphTo({ stagger: cfg.stagger, ringDuration: cfg.ringDuration }, +document.getElementById('slMorphDur').value);
  syncUI(cfg);
  setStatus('Randomized timing');
}

function randomizeShape() {
  const cfg = {
    numRings:     randInt(4, 110),
    warpAmount:   rand(0, 0.6),
    ringDuration: rand(0.05, 0.75),
    stagger:      rand(0, 1),
  };
  anim.morphTo({ warpAmount: cfg.warpAmount, stagger: cfg.stagger, ringDuration: cfg.ringDuration, numRings: cfg.numRings }, +document.getElementById('slMorphDur').value);
  syncUI(cfg);
  if (cfg.numRings) { document.getElementById('slNumRings').value = cfg.numRings; document.getElementById('vNumRings').textContent = cfg.numRings; }
  setStatus('Randomized shape');
}

// ── Mutate (nudge current values) ─────────────────────────────────────────
function mutateAll(pct) {
  const str = pct / 100;
  const opts = anim._options;
  const lc = mutateColor(opts.lineColor, str);
  const gc = mutateColor(opts.glowColor, str);
  const cfg = {
    lineColor:         lc,
    glowColor:         gc,
    opacity:           nudge(opts.opacity,           0.1, 1.0,  str),
    glowOpacity:       nudge(opts.glowOpacity,       0.0, 0.6,  str),
    emissiveIntensity: nudge(opts.emissiveIntensity, 0.4, 6.0,  str),
    stagger:           nudge(opts.stagger,           0.0, 1.0,   str),
    warpAmount:        nudge(opts.warpAmount,        0.0, 0.55,  str),
    ringDuration:      nudge(opts.ringDuration,      0.05, 0.75, str),
    colorSpread:       nudge(opts.colorSpread,       0.0, 0.5,   str),
    brightSpread:      nudge(opts.brightSpread,      0.0, 0.5,   str),
    flickerAmp:        nudge(opts.flickerAmp,        0.0, 0.4,   str),
    flickerSpeed:      nudge(opts.flickerSpeed,      0.2, 12.0,  str),
  };
  anim.morphTo(cfg, 400);
  syncUI(cfg);
  document.getElementById('colLine').value = '#' + lc.toString(16).padStart(6, '0');
  document.getElementById('colGlow').value = '#' + gc.toString(16).padStart(6, '0');
  setStatus('Mutated');
}

function mutateColors(pct) {
  const str = pct / 100;
  const lc = mutateColor(anim._options.lineColor, str);
  const gc = mutateColor(anim._options.glowColor, str);
  anim.morphTo({ lineColor: lc, glowColor: gc }, +document.getElementById('slMorphDur').value);
  document.getElementById('colLine').value = '#' + lc.toString(16).padStart(6, '0');
  document.getElementById('colGlow').value = '#' + gc.toString(16).padStart(6, '0');
  setStatus('Mutated colors');
}

function mutateTiming(pct) {
  const str = pct / 100;
  const opts = anim._options;
  const stagger      = nudge(opts.stagger,      0,    1,    str);
  const ringDuration = nudge(opts.ringDuration, 0.05, 0.75, str);
  const warpAmount   = nudge(opts.warpAmount,   0,    0.55, str);
  const flickerAmp   = nudge(opts.flickerAmp,   0,    0.4,  str);
  const flickerSpeed = nudge(opts.flickerSpeed, 0.2,  12,   str);
  anim.morphTo({ stagger, ringDuration, warpAmount, flickerAmp, flickerSpeed }, +document.getElementById('slMorphDur').value);
  syncUI({ stagger, ringDuration, warpAmount, flickerAmp, flickerSpeed });
  setStatus('Mutated timing');
}

document.getElementById('btnRandAll').addEventListener('click',     randomizeAll);
document.getElementById('btnRandColors').addEventListener('click',  randomizeColors);
document.getElementById('btnRandTiming').addEventListener('click',  randomizeTiming);
document.getElementById('btnRandShape').addEventListener('click',   randomizeShape);
document.getElementById('btnMutate').addEventListener('click',     () => mutateAll(+document.getElementById('slMutateStr').value));
document.getElementById('btnMutateColors').addEventListener('click',() => mutateColors(+document.getElementById('slMutateStr').value));
document.getElementById('btnMutateTiming').addEventListener('click',() => mutateTiming(+document.getElementById('slMutateStr').value));

// ── Status bar ─────────────────────────────────────────────────────────────
let statusTimer = null;
function setStatus(msg) {
  document.getElementById('status-bar').textContent = msg;
  clearTimeout(statusTimer);
  statusTimer = setTimeout(() => { document.getElementById('status-bar').textContent = ''; }, 2000);
}

// ── Resize ─────────────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
  composer.setSize(innerWidth, innerHeight);
  bloomPass.resolution.set(innerWidth, innerHeight);
});

// ── Helpers ────────────────────────────────────────────────────────────────
function syncProgress(p) {
  slProgress.value = Math.round(p * 1000);
  vProgress.textContent = p.toFixed(3);
}

// ── RAF ────────────────────────────────────────────────────────────────────
const clock = new THREE.Clock();
renderer.setAnimationLoop(() => {
  const dt = Math.min(clock.getDelta() * 1000, 100); // cap at 100ms to prevent huge jumps
  anim.tick(dt);
  if (!scrubbing) syncProgress(anim.progress);
  controls.update();
  composer.render();
});
