<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>S9-OV — CommandTerminal Visual Test</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Share+Tech+Mono&family=Noto+Sans+JP:wght@300;400&display=swap" rel="stylesheet" />

  <!-- Aesthetic system -->
  <link rel="stylesheet" href="/aesthetic/index.css" />

  <!-- Component CSS -->
  <link rel="stylesheet" href="/components/panel-shell.css" />
  <link rel="stylesheet" href="/components/command-terminal.css" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--void);
      color: var(--text-primary);
      font-family: var(--font-terminal);
    }

    .demo-layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      padding: 16px;
      height: 100vh;
    }

    .demo-panel {
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .s9-panel {
      min-height: 0;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .s9-panel__body {
      flex: 1;
      min-height: 0;
      padding: 0;
      overflow: hidden;
    }

    .s9-terminal {
      height: 100%;
    }

    .demo-controls {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 16px;
      background: var(--panel-bg-solid);
      border: 1px solid var(--panel-border);
      font-family: var(--font-terminal);
      font-size: 0.65rem;
      color: var(--text-secondary);
    }

    .demo-controls h3 {
      font-family: var(--font-holo);
      font-size: 0.6rem;
      letter-spacing: 0.1em;
      color: var(--neon-cyan);
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .demo-btn {
      font-family: var(--font-terminal);
      font-size: 0.6rem;
      color: var(--neon-amber);
      background: color-mix(in srgb, var(--neon-amber) 10%, transparent);
      border: 1px solid var(--neon-amber);
      padding: 4px 10px;
      cursor: pointer;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .demo-btn:hover {
      background: color-mix(in srgb, var(--neon-amber) 20%, transparent);
    }

    .demo-btn-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .demo-log {
      font-family: var(--font-terminal);
      font-size: 0.55rem;
      color: var(--text-dim);
      border-top: 1px solid var(--panel-border-dim);
      padding-top: 8px;
      max-height: 80px;
      overflow-y: auto;
    }

    .demo-log p { margin: 2px 0; }
  </style>
</head>

<body>
  <div class="demo-layout">

    <!-- ── Terminal Panel ─────────────────────────────────────── -->
    <div class="demo-panel">
      <div class="s9-panel s9-panel--active"
           role="region" aria-label="COMMAND INTERFACE"
           tabindex="0" data-s9-id="term-01" data-s9-state="active">
        <div class="s9-panel__header">
          <span class="s9-panel__header-label">COMMAND INTERFACE</span>
          <span class="s9-panel__header-jp">コマンドインターフェース</span>
          <span class="s9-panel__header-status" aria-live="polite">● READY</span>
        </div>
        <div class="s9-panel__body holographic">
          <div class="s9-terminal" id="terminal-01">
            <div class="s9-terminal__output" id="term-output"></div>
            <div class="s9-terminal__input-row">
              <span class="s9-terminal__prompt" id="term-prompt">[S9]▶</span>
              <input
                class="s9-terminal__input"
                id="term-input"
                type="text"
                autocomplete="off"
                autocorrect="off"
                autocapitalize="off"
                spellcheck="false"
                placeholder="enter command..."
                aria-label="Command input"
              />
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- ── Controls ───────────────────────────────────────────── -->
    <div class="demo-controls">
      <h3>CommandTerminal — Visual Test Controls</h3>

      <p>
        Type in the terminal on the left and press <strong>Enter</strong> to submit.
        Use <strong>↑ / ↓</strong> to navigate history. Press <strong>Tab</strong>
        for tab-completion (tries to complete "help", "status", "clear", "scan").
      </p>

      <div class="demo-btn-row">
        <button class="demo-btn" id="btn-sys">PRINT SYS LINE</button>
        <button class="demo-btn" id="btn-err">PRINT ERR LINE</button>
        <button class="demo-btn" id="btn-info">PRINT INFO LINE</button>
        <button class="demo-btn" id="btn-clear">CLEAR OUTPUT</button>
        <button class="demo-btn" id="btn-prompt">CHANGE PROMPT</button>
        <button class="demo-btn" id="btn-flood">FLOOD 20 LINES</button>
        <button class="demo-btn" id="btn-focus">FOCUS INPUT</button>
      </div>

      <div class="demo-log" id="event-log">
        <p><em>Events will appear here…</em></p>
      </div>
    </div>

  </div>

  <script type="module">
    import {
      mountTerminal,
      unmountTerminal,
      printLine,
      clearOutput,
      setPrompt,
      focusInput,
    } from '/components/command-terminal.js';

    const termEl = document.getElementById('terminal-01');

    // ── Tab completion handler ────────────────────────────────
    const COMPLETIONS = ['help', 'status', 'clear', 'scan', 'connect', 'disconnect', 'identify'];

    function tabComplete(value) {
      if (!value) return null;
      const match = COMPLETIONS.find((cmd) => cmd.startsWith(value));
      return match ?? null;
    }

    // ── Command handler ───────────────────────────────────────
    function onSubmit(command) {
      const lower = command.trim().toLowerCase();

      if (lower === 'help') {
        printLine(termEl, 'Available commands: help, status, clear, scan, connect, disconnect, identify', 'info');
        return;
      }

      if (lower === 'clear') {
        clearOutput(termEl);
        return;
      }

      if (lower === 'status') {
        printLine(termEl, 'SEC.9 NODE STATUS — ONLINE', 'sys');
        printLine(termEl, 'Ghost barrier: ACTIVE | Sync rate: 99.7%', 'info');
        return;
      }

      if (lower === 'scan') {
        printLine(termEl, 'Initiating network scan…', 'sys');
        setTimeout(() => printLine(termEl, '14 nodes detected — 2 anomalous', 'info'), 600);
        setTimeout(() => printLine(termEl, 'WARNING: Unidentified ghost signature on subnet 10.9.3.0/24', 'err'), 1200);
        return;
      }

      if (lower === 'identify') {
        printLine(termEl, 'Identity shell: KUSANAGI.M — MAJOR — ALPHA-7 CLEARANCE', 'sys');
        return;
      }

      if (lower === 'connect') {
        printLine(termEl, 'ERROR: No target specified. Usage: connect <host>', 'err');
        return;
      }

      if (lower === 'disconnect') {
        printLine(termEl, 'Disconnecting from all active sessions…', 'sys');
        setTimeout(() => printLine(termEl, 'All sessions terminated.', 'info'), 500);
        return;
      }

      printLine(termEl, `Unknown command: "${command}". Type "help" for available commands.`, 'err');
    }

    // ── Mount ─────────────────────────────────────────────────
    mountTerminal(termEl, { onSubmit, tabComplete });

    // ── Seed with initial lines ───────────────────────────────
    printLine(termEl, 'SECTION 9 — COMMAND INTERFACE v4.2.1', 'sys');
    printLine(termEl, '公安9課 コマンドインターフェース', 'info');
    printLine(termEl, '──────────────────────────────────────', 'info');
    printLine(termEl, 'Type "help" for available commands.', 'sys');

    // ── Event log ─────────────────────────────────────────────
    const eventLog = document.getElementById('event-log');

    function logEvent(msg) {
      const p = document.createElement('p');
      p.textContent = `[${new Date().toISOString().slice(11, 23)}] ${msg}`;
      eventLog.appendChild(p);
      eventLog.scrollTop = eventLog.scrollHeight;
    }

    termEl.addEventListener('s9:terminal-submit', (e) => {
      logEvent(`s9:terminal-submit → command="${e.detail.command}"`);
    });

    termEl.addEventListener('s9:terminal-clear', () => {
      logEvent('s9:terminal-clear fired');
    });

    // ── Buttons ───────────────────────────────────────────────
    document.getElementById('btn-sys').addEventListener('click', () => {
      printLine(termEl, 'Ghost barrier integrity check passed.', 'sys');
    });

    document.getElementById('btn-err').addEventListener('click', () => {
      printLine(termEl, 'ERROR: Neural dive timeout — connection lost.', 'err');
    });

    document.getElementById('btn-info').addEventListener('click', () => {
      printLine(termEl, 'Uplink established — bandwidth 44 Gb/s.', 'info');
    });

    document.getElementById('btn-clear').addEventListener('click', () => {
      clearOutput(termEl);
    });

    let promptCount = 0;
    const PROMPTS = ['[S9]▶', '[KUSANAGI]▶', '[SEC9.CORE]▶', '[GHOST]▶'];
    document.getElementById('btn-prompt').addEventListener('click', () => {
      promptCount = (promptCount + 1) % PROMPTS.length;
      setPrompt(termEl, PROMPTS[promptCount]);
      logEvent(`setPrompt → "${PROMPTS[promptCount]}"`);
    });

    document.getElementById('btn-flood').addEventListener('click', () => {
      const TYPES = ['sys', 'err', 'info'];
      const MSGS = [
        'Packet intercept confirmed on subnet 10.9.3.0/24',
        'Ghost barrier integrity check passed',
        'Neural dive initialised — depth level 4',
        'Anomalous traffic detected from 203.0.113.47',
        'Decryption handshake timeout — retrying',
        'Identity shell confirmed: ARAMAKI.D',
        'Section 9 relay node 7 reconnected',
        'Tachikoma unit 3 reporting perimeter clear',
        'Memory partition lock engaged on target host',
        'Satellite uplink established — bandwidth 44Gb/s',
        'Countermeasure subroutine deployed on port 8443',
        'Ghost coefficient drift detected: -0.3% variance',
        'Cyberbrain access request from BATOU.001 approved',
        'Proxy chain resolved: 14 hops, latency 8ms',
        'Classified asset cache cleared from volatile store',
        'WARNING: Unidentified ghost signature detected',
        'ERROR: Neural dive rejected — barrier active',
        'Ghost resonance stabilised at 98.4%',
        'Thermal suppression engaged on field unit 2',
        'Secure handshake complete — encryption 256-bit',
      ];
      for (let i = 0; i < 20; i++) {
        const type = TYPES[Math.floor(Math.random() * TYPES.length)];
        const msg = MSGS[Math.floor(Math.random() * MSGS.length)];
        printLine(termEl, msg, type);
      }
    });

    document.getElementById('btn-focus').addEventListener('click', () => {
      focusInput(termEl);
    });

    // ── Auto-focus on load ─────────────────────────────────────
    focusInput(termEl);
  </script>
</body>
</html>
