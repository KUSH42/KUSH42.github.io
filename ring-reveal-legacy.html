<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Ring Reveal — v0 (no bloom, no gradients)</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; }
    canvas { display: block; }
    #badge {
      position: fixed;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      background: #100800ee;
      border: 1px solid #ff6622aa;
      color: #ff9966;
      font: 11px/1.6 monospace;
      padding: 6px 14px;
      border-radius: 3px;
      text-align: center;
      pointer-events: none;
      white-space: nowrap;
    }
  </style>
</head>
<body>
<div id="badge">
  v0 — THREE.LineSegments · no bloom · no colour gradients · 1px lines
</div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { buildRingGeometry } from './components/ring-reveal/RingGeometry.js';
import { createRingMaterial } from './components/ring-reveal/RingMaterial.js';

function easeInOutCubic(t) { return t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2,3)/2; }

// ── Scene ──────────────────────────────────────────────────────────────────
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x020808);

const camera = new THREE.PerspectiveCamera(45, innerWidth / innerHeight, 0.1, 100);
camera.position.set(0, 0, 3.5);

// Plain renderer — no post-processing, no bloom
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.autoRotate = true;
controls.autoRotateSpeed = 0.6;

// ── Same geometry as right side, same base colour — differences are the point ─
const COLOR = 0xff6600;   // single flat orange — no B gradient endpoint

const geomArgs = {
  radius: 1.030, numRings: 48, samplesPerRing: 256,
  latitudeMin: -Math.PI / 2, latitudeMax: Math.PI / 2, upAxis: 'y',
};
const sharedMatArgs = {
  lineWidth: 1, numRings: 48,
  stagger: 0.55, ringDuration: 0.35,
  warpAmount: 0.37, emissiveIntensity: 3.00,
  direction: 'south-to-north',
  colorSpread: 0.52, brightSpread: 0.28,
  flickerAmp: 0.15, flickerSpeed: 4.0,
  arcColorSpread: 0,   // no arc gradient — arcPosition wasn't wired up
};

const baseMat = createRingMaterial({
  ...sharedMatArgs,
  lineColor: COLOR, lineColorB: COLOR,   // B == A → no gradient
  opacity: 0.90, blending: THREE.NormalBlending,
});
const baseRings = new THREE.LineSegments(buildRingGeometry(geomArgs), baseMat);
baseRings.renderOrder = 4;
scene.add(baseRings);

// Single glow ring (pre-multi-layer era)
const glowMat = createRingMaterial({
  ...sharedMatArgs,
  lineColor: COLOR, lineColorB: COLOR,
  opacity: 0.25, blending: THREE.AdditiveBlending,
});
const glowRings = new THREE.LineSegments(
  buildRingGeometry({ ...geomArgs, radius: 1.030 * 1.108 }), glowMat
);
glowRings.renderOrder = 4;
scene.add(glowRings);

function setProgress(p) {
  baseMat.uniforms.uProgress.value = p;
  glowMat.uniforms.uProgress.value = p;
}

// ── Camera sync ────────────────────────────────────────────────────────────
let syncingCamera = false;
controls.addEventListener('change', () => {
  if (syncingCamera) return;
  window.parent.postMessage({
    type: 'camera',
    position: camera.position.toArray(),
    target: controls.target.toArray(),
  }, '*');
});
window.addEventListener('message', e => {
  if (e.data?.type !== 'camera-sync') return;
  syncingCamera = true;
  camera.position.fromArray(e.data.position);
  controls.target.fromArray(e.data.target);
  controls.update();
  syncingCamera = false;
});

// ── RAF loop ───────────────────────────────────────────────────────────────
let elapsed = 0, reversed = false, time = 0;
const durationMs = 1800;

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

const clock = new THREE.Clock();
renderer.setAnimationLoop(() => {
  const dt = Math.min(clock.getDelta() * 1000, 100);
  time += dt / 1000;
  baseMat.uniforms.uTime.value = time;
  glowMat.uniforms.uTime.value = time;

  elapsed += dt;
  const rawT   = Math.min(elapsed / durationMs, 1.0);
  const easedT = easeInOutCubic(rawT);
  setProgress(reversed ? 1.0 - easedT : easedT);
  if (rawT >= 1.0) { elapsed = 0; reversed = !reversed; }

  controls.update();
  renderer.render(scene, camera);   // plain render — no composer
});
</script>
</body>
</html>
