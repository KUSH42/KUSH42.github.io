<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>DisintegrationEffect Demo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; }
    canvas { display: block; }
    #ui {
      position: fixed;
      top: 16px;
      left: 16px;
      color: #0ff;
      font-family: monospace;
      font-size: 13px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    #ui label { display: flex; align-items: center; gap: 8px; }
    #ui input[type=range] { width: 160px; accent-color: #0ff; }
    #ui button {
      background: #001a1a;
      color: #0ff;
      border: 1px solid #0ff4;
      padding: 4px 12px;
      cursor: pointer;
      font-family: monospace;
    }
    #ui button:hover { background: #003333; }
    #ui select {
      background: #001a1a;
      color: #0ff;
      border: 1px solid #0ff4;
      font-family: monospace;
      padding: 2px 6px;
    }
  </style>
</head>
<body>
<div id="ui">
  <label>Progress <input type="range" id="sliderProgress" min="0" max="100" value="0" style="width:200px">
    <span id="valProgress">0.00</span>
  </label>
  <label>Noise scale <input type="range" id="sliderNoise" min="1" max="80" value="25">
    <span id="valNoise">2.5</span>
  </label>
  <label>Edge width <input type="range" id="sliderEdge" min="1" max="50" value="12">
    <span id="valEdge">0.12</span>
  </label>
  <label>Edge glow <input type="range" id="sliderGlow" min="0" max="200" value="60">
    <span id="valGlow">6.0</span>
  </label>
  <label>Axis
    <select id="selAxis">
      <option value="y" selected>+Y (bottom→top)</option>
      <option value="-y">-Y (top→bottom)</option>
      <option value="x">+X (left→right)</option>
      <option value="z">+Z (front→back)</option>
    </select>
  </label>
  <label>Object
    <select id="selObject">
      <option value="torus" selected>Torus</option>
      <option value="sphere">Sphere</option>
      <option value="box">Box</option>
      <option value="knot">Torus Knot</option>
    </select>
  </label>
  <button id="btnPlay">▶ Play</button>
  <button id="btnReset">↺ Reset</button>
</div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';
import { DisintegrationEffect } from './components/DisintegrationEffect.js';

// ── Scene ──────────────────────────────────────────────────────────────────
const scene    = new THREE.Scene();
scene.background = new THREE.Color(0x020808);

const camera   = new THREE.PerspectiveCamera(50, innerWidth / innerHeight, 0.1, 100);
camera.position.set(0, 1.5, 5);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.target.set(0, 0, 0);

// ── Lights ─────────────────────────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0xffffff, 0.4));
const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
dirLight.position.set(3, 5, 3);
scene.add(dirLight);

// ── Post-processing (bloom to show edge glow) ──────────────────────────────
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
composer.addPass(new UnrealBloomPass(
  new THREE.Vector2(innerWidth, innerHeight), 0.8, 0.3, 0.7
));
composer.addPass(new OutputPass());

// ── Object factory ─────────────────────────────────────────────────────────
const GEOMETRIES = {
  torus:  () => new THREE.TorusGeometry(1, 0.4, 64, 128),
  sphere: () => new THREE.SphereGeometry(1.2, 64, 64),
  box:    () => new THREE.BoxGeometry(1.8, 1.8, 1.8, 4, 4, 4),
  knot:   () => new THREE.TorusKnotGeometry(0.9, 0.32, 256, 32),
};

const AXES = {
  'y':  new THREE.Vector3( 0,  1,  0),
  '-y': new THREE.Vector3( 0, -1,  0),
  'x':  new THREE.Vector3( 1,  0,  0),
  'z':  new THREE.Vector3( 0,  0,  1),
};

let mesh  = null;
let fx    = null;
let clock = new THREE.Clock();

function buildMesh(type) {
  if (mesh) {
    if (fx) { fx.dispose(); fx = null; }
    scene.remove(mesh);
    mesh.geometry.dispose();
  }

  const geo = GEOMETRIES[type]();
  const mat = new THREE.MeshStandardMaterial({
    color:     0x00ccff,
    metalness: 0.3,
    roughness: 0.4,
  });

  mesh = new THREE.Mesh(geo, mat);
  scene.add(mesh);

  const axisKey = document.getElementById('selAxis').value;
  buildFx(axisKey);
}

function buildFx(axisKey) {
  if (fx) { fx.dispose(); fx = null; }

  fx = new DisintegrationEffect(mesh, {
    axis:           AXES[axisKey],
    noiseScale:     parseFloat(document.getElementById('sliderNoise').value) / 10,
    edgeWidth:      parseFloat(document.getElementById('sliderEdge').value) / 100,
    edgeColor:      new THREE.Color(0x00ffcc),
    edgeIntensity:  parseFloat(document.getElementById('sliderGlow').value) / 10,
  });
  fx.progress = parseFloat(document.getElementById('sliderProgress').value) / 100;
}

buildMesh('torus');

// ── Playback ───────────────────────────────────────────────────────────────
let playing = false;
let playT   = 0;
const PLAY_DURATION = 3.0; // seconds

document.getElementById('btnPlay').addEventListener('click', () => {
  playing = true;
  playT = fx.progress * PLAY_DURATION;
});

document.getElementById('btnReset').addEventListener('click', () => {
  playing = false;
  playT = 0;
  fx.progress = 0;
  document.getElementById('sliderProgress').value = 0;
  document.getElementById('valProgress').textContent = '0.00';
});

// ── Controls ───────────────────────────────────────────────────────────────
document.getElementById('sliderProgress').addEventListener('input', e => {
  const v = e.target.value / 100;
  fx.progress = v;
  playing = false;
  document.getElementById('valProgress').textContent = v.toFixed(2);
});

document.getElementById('sliderNoise').addEventListener('input', e => {
  const v = e.target.value / 10;
  document.getElementById('valNoise').textContent = v.toFixed(1);
  // Noise scale requires shader recompile — rebuild fx
  if (fx) {
    const p = fx.progress;
    buildFx(document.getElementById('selAxis').value);
    fx.progress = p;
  }
});

document.getElementById('sliderEdge').addEventListener('input', e => {
  const v = e.target.value / 100;
  fx.edgeWidth = v;
  document.getElementById('valEdge').textContent = v.toFixed(2);
});

document.getElementById('sliderGlow').addEventListener('input', e => {
  const v = e.target.value / 10;
  fx.edgeIntensity = v;
  document.getElementById('valGlow').textContent = v.toFixed(1);
});

document.getElementById('selAxis').addEventListener('change', e => {
  const p = fx ? fx.progress : 0;
  buildFx(e.target.value);
  fx.progress = p;
});

document.getElementById('selObject').addEventListener('change', e => {
  buildMesh(e.target.value);
  document.getElementById('sliderProgress').value = 0;
  document.getElementById('valProgress').textContent = '0.00';
  playing = false;
  playT = 0;
});

// ── Resize ─────────────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
  composer.setSize(innerWidth, innerHeight);
});

// ── Animation loop ─────────────────────────────────────────────────────────
renderer.setAnimationLoop(() => {
  const dt = clock.getDelta();

  if (fx) {
    fx.tick(dt * 1000);

    if (playing) {
      playT += dt;
      const p = Math.min(playT / PLAY_DURATION, 1.0);
      fx.progress = p;
      document.getElementById('sliderProgress').value = p * 100;
      document.getElementById('valProgress').textContent = p.toFixed(2);
      if (p >= 1.0) playing = false;
    }
  }

  if (mesh) mesh.rotation.y += dt * 0.3;

  controls.update();
  composer.render();
});
</script>
</body>
</html>
