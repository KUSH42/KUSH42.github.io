<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>DisintegrationEffect Demo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; }
    canvas { display: block; }
    #ui {
      position: fixed;
      top: 16px;
      left: 16px;
      color: #0ff;
      font-family: monospace;
      font-size: 13px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    #ui label { display: flex; align-items: center; gap: 8px; }
    #ui input[type=range] { width: 150px; accent-color: #0ff; }
    #ui input[type=checkbox] { accent-color: #0ff; }
    #ui button {
      background: #001a1a;
      color: #0ff;
      border: 1px solid #0ff4;
      padding: 4px 12px;
      cursor: pointer;
      font-family: monospace;
    }
    #ui button:hover { background: #003333; }
    #ui button.active { background: #004444; border-color: #0ff; }
    #ui select {
      background: #001a1a;
      color: #0ff;
      border: 1px solid #0ff4;
      font-family: monospace;
      padding: 2px 6px;
    }
    .section-label {
      color: #0ff8;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-top: 4px;
    }
    .btn-row { display: flex; gap: 6px; }
  </style>
</head>
<body>
<div id="ui">
  <div class="section-label">Disintegration</div>

  <label>Progress
    <input type="range" id="sliderProgress" min="0" max="100" value="0" style="width:180px">
    <span id="valProgress">0.00</span>
  </label>
  <label>Block size
    <input type="range" id="sliderNoise" min="1" max="200" value="100">
    <span id="valNoise">10.0</span>
  </label>
  <label>Edge scatter
    <input type="range" id="sliderEdge" min="1" max="80" value="15">
    <span id="valEdge">0.15</span>
  </label>
  <label>Edge glow
    <input type="range" id="sliderGlow" min="0" max="200" value="60">
    <span id="valGlow">6.0</span>
  </label>
  <label>Axis
    <select id="selAxis">
      <option value="y"  selected>+Y (bottom→top)</option>
      <option value="-y">−Y (top→bottom)</option>
      <option value="x" >+X (left→right)</option>
      <option value="z" >+Z (front→back)</option>
    </select>
  </label>
  <label>Object
    <select id="selObject">
      <option value="torus"  selected>Torus</option>
      <option value="sphere">Sphere</option>
      <option value="box">Box</option>
      <option value="knot">Torus Knot</option>
    </select>
  </label>

  <div class="btn-row">
    <button id="btnDisintegrate">▼ Disintegrate</button>
    <button id="btnReconstruct">▲ Reconstruct</button>
    <button id="btnLoop">⟳ Loop</button>
  </div>
  <button id="btnReset">↺ Reset</button>

  <div class="section-label">Vertex Glitch</div>

  <label><input type="checkbox" id="chkGlitch"> Enabled</label>
  <label>Block size
    <input type="range" id="sliderGlitchScale" min="1" max="200" value="100">
    <span id="valGlitchScale">10.0</span>
  </label>
  <label>Frequency
    <input type="range" id="sliderGlitchFreq" min="1" max="60" value="15">
    <span id="valGlitchFreq">15</span> fps
  </label>
  <label>Threshold
    <input type="range" id="sliderGlitchThresh" min="1" max="100" value="8">
    <span id="valGlitchThresh">0.08</span>
  </label>
</div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';
import { DisintegrationEffect } from './components/DisintegrationEffect.js';

// ── Scene ──────────────────────────────────────────────────────────────────
const scene  = new THREE.Scene();
scene.background = new THREE.Color(0x020808);

const camera = new THREE.PerspectiveCamera(50, innerWidth / innerHeight, 0.1, 100);
camera.position.set(0, 1.5, 5);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;

scene.add(new THREE.AmbientLight(0xffffff, 0.4));
const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
dirLight.position.set(3, 5, 3);
scene.add(dirLight);

// ── Post-processing ────────────────────────────────────────────────────────
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
composer.addPass(new UnrealBloomPass(
  new THREE.Vector2(innerWidth, innerHeight), 0.8, 0.3, 0.7
));
composer.addPass(new OutputPass());

// ── Geometry factory ───────────────────────────────────────────────────────
const GEOMETRIES = {
  torus:  () => new THREE.TorusGeometry(1, 0.4, 64, 128),
  sphere: () => new THREE.SphereGeometry(1.2, 64, 64),
  box:    () => new THREE.BoxGeometry(1.8, 1.8, 1.8, 4, 4, 4),
  knot:   () => new THREE.TorusKnotGeometry(0.9, 0.32, 256, 32),
};

const AXES = {
  'y':  new THREE.Vector3( 0,  1,  0),
  '-y': new THREE.Vector3( 0, -1,  0),
  'x':  new THREE.Vector3( 1,  0,  0),
  'z':  new THREE.Vector3( 0,  0,  1),
};

let mesh = null;
let fx   = null;
const clock = new THREE.Clock();

function buildMesh(type) {
  if (fx)   { fx.dispose(); fx = null; }
  if (mesh) { scene.remove(mesh); mesh.geometry.dispose(); }

  mesh = new THREE.Mesh(
    GEOMETRIES[type](),
    new THREE.MeshStandardMaterial({ color: 0x00ccff, metalness: 0.3, roughness: 0.4 })
  );
  scene.add(mesh);
  buildFx(document.getElementById('selAxis').value);
}

function buildFx(axisKey) {
  const prevProgress    = fx ? fx.progress : 0;
  const glitchEnabled   = fx ? fx.glitch.enabled : false;
  if (fx) { fx.dispose(); fx = null; }

  fx = new DisintegrationEffect(mesh, {
    axis:          AXES[axisKey],
    noiseScale:    +document.getElementById('sliderNoise').value / 10,
    edgeWidth:     +document.getElementById('sliderEdge').value  / 100,
    edgeColor:     new THREE.Color(0x00ffcc),
    edgeIntensity: +document.getElementById('sliderGlow').value  / 10,
  });
  fx.progress = prevProgress;

  fx.glitch.enabled    = glitchEnabled;
  fx.glitch.noiseScale = +document.getElementById('sliderGlitchScale').value / 10;
  fx.glitch.frequency  = +document.getElementById('sliderGlitchFreq').value;
  fx.glitch.threshold  = +document.getElementById('sliderGlitchThresh').value / 100;

  // Keep progress slider in sync
  document.getElementById('sliderProgress').value = prevProgress * 100;
  document.getElementById('valProgress').textContent = prevProgress.toFixed(2);
}

buildMesh('torus');

// ── Disintegration controls ────────────────────────────────────────────────
document.getElementById('sliderProgress').addEventListener('input', e => {
  const v = e.target.value / 100;
  fx.stopAnimation();
  fx.progress = v;
  document.getElementById('valProgress').textContent = v.toFixed(2);
});

document.getElementById('sliderNoise').addEventListener('input', e => {
  const v = e.target.value / 10;
  document.getElementById('valNoise').textContent = v.toFixed(1);
  // noiseScale is baked into the shader at compile time via uniform —
  // actually it IS a uniform, so update directly:
  fx._uniforms.uDisintNoiseScale.value = v;
});

document.getElementById('sliderEdge').addEventListener('input', e => {
  fx.edgeWidth = e.target.value / 100;
  document.getElementById('valEdge').textContent = fx.edgeWidth.toFixed(2);
});

document.getElementById('sliderGlow').addEventListener('input', e => {
  fx.edgeIntensity = e.target.value / 10;
  document.getElementById('valGlow').textContent = fx.edgeIntensity.toFixed(1);
});

document.getElementById('selAxis').addEventListener('change', e => {
  buildFx(e.target.value);
});

document.getElementById('selObject').addEventListener('change', e => {
  buildMesh(e.target.value);
  syncProgressUI(0);
});

document.getElementById('btnDisintegrate').addEventListener('click', () => {
  looping = false;
  document.getElementById('btnLoop').classList.remove('active');
  fx.disintegrate(2500);
});

document.getElementById('btnReconstruct').addEventListener('click', () => {
  looping = false;
  document.getElementById('btnLoop').classList.remove('active');
  fx.reconstruct(2500);
});

let looping = false;
function startLoop() {
  fx.disintegrate(2500, () => fx.reconstruct(2500, () => { if (looping) startLoop(); }));
}
document.getElementById('btnLoop').addEventListener('click', () => {
  looping = !looping;
  document.getElementById('btnLoop').classList.toggle('active', looping);
  if (looping) startLoop();
  else fx.stopAnimation();
});

document.getElementById('btnReset').addEventListener('click', () => {
  fx.stopAnimation();
  fx.progress = 0;
  syncProgressUI(0);
});

// ── Glitch controls ────────────────────────────────────────────────────────
document.getElementById('chkGlitch').addEventListener('change', e => {
  fx.glitch.enabled = e.target.checked;
});

document.getElementById('sliderGlitchScale').addEventListener('input', e => {
  fx.glitch.noiseScale = e.target.value / 10;
  document.getElementById('valGlitchScale').textContent = fx.glitch.noiseScale.toFixed(1);
});

document.getElementById('sliderGlitchFreq').addEventListener('input', e => {
  fx.glitch.frequency = +e.target.value;
  document.getElementById('valGlitchFreq').textContent = e.target.value;
});

document.getElementById('sliderGlitchThresh').addEventListener('input', e => {
  fx.glitch.threshold = e.target.value / 100;
  document.getElementById('valGlitchThresh').textContent = fx.glitch.threshold.toFixed(2);
});

// ── Helpers ────────────────────────────────────────────────────────────────
function syncProgressUI(v) {
  document.getElementById('sliderProgress').value = v * 100;
  document.getElementById('valProgress').textContent = v.toFixed(2);
}

// ── Resize ─────────────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
  composer.setSize(innerWidth, innerHeight);
});

// ── Animation loop ─────────────────────────────────────────────────────────
renderer.setAnimationLoop(() => {
  const dt = clock.getDelta();

  if (fx) {
    fx.tick(dt * 1000);
    // Sync progress slider while animation is running
    syncProgressUI(fx.progress);
  }

  if (mesh) mesh.rotation.y += dt * 0.3;
  controls.update();
  composer.render();
});
</script>
</body>
</html>
